<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15m Strategy Snapshots</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #070a12;
            --panel: rgba(13, 18, 31, 0.86);
            --panel-2: rgba(17, 24, 39, 0.92);
            --line: rgba(148, 163, 184, 0.18);
            --text: #f8fafc;
            --muted: #94a3b8;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --blue: #3b82f6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(6, 182, 212, 0.18), transparent 34rem),
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 30rem),
                var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
        }

        .main {
            margin-left: 260px;
            padding: 22px 34px 56px;
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 6px;
            font-size: 0.94rem;
        }

        .meta {
            color: var(--muted);
            font-size: 0.82rem;
            text-align: right;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
            padding: 14px;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 18px;
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input, select, button {
            border: 1px solid var(--line);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border-radius: 11px;
            padding: 10px 12px;
            font: inherit;
        }

        select option { background: #0f172a; color: #f8fafc; }

        button {
            cursor: pointer;
            font-weight: 700;
            background: linear-gradient(135deg, #0891b2, #2563eb);
            border: 0;
        }

        button.secondary {
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid var(--line);
        }

        .snapshot-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 2px 14px;
            margin-bottom: 12px;
        }

        .snap-chip {
            border: 1px solid var(--line);
            background: rgba(15, 23, 42, 0.78);
            color: var(--muted);
            border-radius: 999px;
            padding: 7px 10px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .snap-chip.active {
            background: rgba(6, 182, 212, 0.18);
            color: var(--text);
            border-color: rgba(6, 182, 212, 0.55);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-card {
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 18px;
            padding: 14px;
            cursor: pointer;
        }

        .summary-card.active { border-color: rgba(6, 182, 212, 0.7); }
        .summary-card h3 { margin: 0 0 10px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .summary-card .net { font-size: 1.8rem; font-weight: 800; }
        .summary-stats { color: var(--muted); display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; font-size: 0.82rem; }      
        
        .table-section {
            border: 1px solid var(--line);
            background: var(--panel-2);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 9px 10px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.11);
            text-align: right;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #0f172a;
            color: #cbd5e1;
            cursor: pointer;
            user-select: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        th.left, td.left { text-align: left; }
        tr:hover td { background: rgba(6, 182, 212, 0.05); }
        tr.rank-up td {
            background: rgba(34, 197, 94, 0.12);
        }
        tr.rank-up:hover td {
            background: rgba(34, 197, 94, 0.18);
        }
        tr.rank-down td {
            background: rgba(239, 68, 68, 0.12);
        }
        tr.rank-down:hover td {
            background: rgba(239, 68, 68, 0.18);
        }
        .pos { color: var(--green); font-weight: 700; }
        .neg { color: var(--red); font-weight: 700; }
        .muted { color: var(--muted); }
        .group-pill {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.14);
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .status {
            color: var(--muted);
            margin: 12px 0;
        }

        .load-more-footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--line);
        }

        @media (max-width: 1024px) {
            .main { margin-left: 0; padding: 20px; }
            .summary-grid { grid-template-columns: 1fr; }
            .topbar { flex-direction: column; }
            .meta { text-align: left; }
        }
    </style>
</head>

<body class="with-sidebar">
    <div id="sidebar-container"></div>
    <script src="sidebar-loader.js"></script>

    <main class="main">
        <div class="topbar">
            <div>
                <h1>15m Strategy Snapshots</h1>
                <div class="subtitle">Cumulative strategy performance from midnight, split into scalper, rev_scalper, and remainder.</div>
            </div>
            <div class="meta" id="meta">No data loaded.</div>
        </div>

        <section class="controls">
            <div>
                <label for="runMode">Run Mode</label>
                <select id="runMode">
                    <option value="live">live</option>
                    <option value="sim">sim</option>
                </select>
            </div>
            <div>
                <label for="productType">Product Type</label>
                <select id="productType">
                    <option value="forex">forex</option>
                    <option value="indices">indices</option>
                    <option value="crypto">crypto</option>
                    <option value="metals">metals</option>
                    <option value="energy">energy</option>
                </select>
            </div>
            <div>
                <label for="dateInput">Date</label>
                <input id="dateInput" type="date">
            </div>
            <div>
                <label for="groupFilter">Group</label>
                <select id="groupFilter">
                    <option value="all">all</option>
                    <option value="scalper">scalper</option>
                    <option value="rev_scalper">rev_scalper</option>
                    <option value="remainder">remainder</option>
                </select>
            </div>
            <div>
                <label for="viewMode">View</label>
                <select id="viewMode">
                    <option value="strategy">strategy rollup</option>
                    <option value="product">product detail</option>
                </select>
            </div>
            <button type="button" onclick="loadSnapshots()">Load</button>
            <button type="button" class="secondary" onclick="selectAdjacent(-1)">Prev</button>
            <button type="button" class="secondary" onclick="selectAdjacent(1)">Next</button>
        </section>

        <div class="snapshot-strip" id="snapshotStrip"></div>
        <div class="summary-grid" id="summaryGrid"></div>
        <div class="status" id="status"></div>
        
        <div class="table-section">
            <div class="table-wrap">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="load-more-footer">
                <span id="snapshotRenderStatus" style="color: var(--muted); font-size: 0.85em;"></span>
                <button id="btnLoadMoreSnaps" class="btn" style="display: none; padding: 8px 16px; font-size: 0.85em; background: var(--amber); color: #020617; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;" onclick="loadMoreSnapshots()">Load More</button>
            </div>
        </div>
    </main>

    <script>
        const productColumn = ['product', 'Product', 'left'];
        const columns = [
            ['snapshot_time', 'Snapshot', 'left'],
            ['strategy_group', 'Group', 'left'],
            ['strategy', 'Strategy', 'left'],
            ['closed_count', 'Closed'],
            ['open_count', 'Open'],
            ['profit_count', 'Profit'],
            ['loss_count', 'Loss'],
            ['buy_profit', 'Buy P'],
            ['buy_loss', 'Buy L'],
            ['sell_profit', 'Sell P'],
            ['sell_loss', 'Sell L'],
            ['profit_net', 'Profit Net'],
            ['loss_net', 'Loss Net'],
            ['net', 'Net']
        ];

        let payload = null;
        let selectedIndex = 0;
        let sortKey = 'net';
        let sortAsc = false;
        let lastSnapPage = 1;
        const SNAP_PAGE_SIZE = 50;
        let filteredSnapRows = [];
        
        function rowKey(row, viewMode) {
            if (viewMode === 'product') {
                return `${row.strategy_group || ''}||${row.strategy || ''}||${row.product || ''}`;
            }
            return `${row.strategy_group || ''}||${row.strategy || ''}`;
        }

        function rankRowsByProfitNet(rows, viewMode) {
            const ranked = [...rows].sort((a, b) => {
                const profitNetDiff = Number(b.profit_net || 0) - Number(a.profit_net || 0);
                if (profitNetDiff !== 0) return profitNetDiff;
                const netDiff = Number(b.net || 0) - Number(a.net || 0);
                if (netDiff !== 0) return netDiff;
                return rowKey(a, viewMode).localeCompare(rowKey(b, viewMode));
            });
            const ranks = new Map();
            ranked.forEach((row, index) => ranks.set(rowKey(row, viewMode), index + 1));
            return ranks;
        }

        function getViewRows(snap, viewMode, group) {
            if (!snap) return [];
            let rows = viewMode === 'product'
                ? [...(snap.product_rows || [])]
                : [...(snap.strategy_rows || snap.rows || [])];
            if (group !== 'all') rows = rows.filter(row => row.strategy_group === group);
            return rows;
        }

        function formatSignedPosition(value) {
            const n = Number(value || 0);
            return `${n >= 0 ? '+' : ''}${n}`;
        }

        function buildCumulativeRankMovementMap(viewMode, group) {
            const movement = new Map();
            if (!payload?.snapshots?.length || selectedIndex <= 0) return movement;

            for (let index = 1; index <= selectedIndex; index += 1) {
                const previousRows = getViewRows(payload.snapshots[index - 1], viewMode, group);
                const currentRows = getViewRows(payload.snapshots[index], viewMode, group);
                const previousRanks = rankRowsByProfitNet(previousRows, viewMode);
                const currentRanks = rankRowsByProfitNet(currentRows, viewMode);

                currentRanks.forEach((currentRank, key) => {
                    const previousRank = previousRanks.get(key);
                    if (!Number.isFinite(previousRank) || !Number.isFinite(currentRank)) return;
                    const delta = previousRank - currentRank;
                    movement.set(key, (movement.get(key) || 0) + delta);
                });
            }

            return movement;
        }

        function decorateRowsWithRankDelta(rows, viewMode, group) {
            const previousSnap = selectedIndex > 0 ? payload?.snapshots?.[selectedIndex - 1] : null;
            const cumulativeMovement = buildCumulativeRankMovementMap(viewMode, group);
            if (!previousSnap) {
                return rows.map(row => ({
                    ...row,
                    _cumPosition: cumulativeMovement.get(rowKey(row, viewMode)) || 0,
                    _displayStrategy: `${row.strategy || ''} (${formatSignedPosition(cumulativeMovement.get(rowKey(row, viewMode)) || 0)})`,
                    _rankHighlight: '',
                    _rankDeltaTitle: ''
                }));
            }

            const currentRanks = rankRowsByProfitNet(rows, viewMode);
            const previousRows = getViewRows(previousSnap, viewMode, group);
            const previousRanks = rankRowsByProfitNet(previousRows, viewMode);
            const previousByKey = new Map(previousRows.map(row => [rowKey(row, viewMode), row]));

            return rows.map(row => {
                const key = rowKey(row, viewMode);
                const previousRow = previousByKey.get(key);
                const currentRank = currentRanks.get(key);
                const previousRank = previousRanks.get(key);
                const currentProfitNet = Number(row.profit_net || 0);
                const previousProfitNet = Number(previousRow?.profit_net || 0);
                const rankImproved = Number.isFinite(currentRank) && Number.isFinite(previousRank) && currentRank < previousRank;
                const rankDropped = Number.isFinite(currentRank) && Number.isFinite(previousRank) && currentRank > previousRank;
                const profitNetImproved = currentProfitNet > previousProfitNet;
                const cumPosition = cumulativeMovement.get(key) || 0;

                let highlight = '';
                if (profitNetImproved && rankImproved) highlight = 'rank-up';
                else if (rankDropped) highlight = 'rank-down';

                let title = '';
                if (Number.isFinite(previousRank)) {
                    title = `Prev profit net ${formatMoney(previousProfitNet)} | Prev rank ${previousRank} | Current rank ${currentRank} | Cum position ${formatSignedPosition(cumPosition)}`;
                }

                return {
                    ...row,
                    _cumPosition: cumPosition,
                    _displayStrategy: `${row.strategy || ''} (${formatSignedPosition(cumPosition)})`,
                    _rankHighlight: highlight,
                    _rankDeltaTitle: title
                };
            });
        }

        function todayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatMoney(value) {
            const n = Number(value || 0);
            return `${n >= 0 ? '+' : ''}${n.toFixed(0)}`;
        }

        function pnlClass(value) {
            const n = Number(value || 0);
            return n >= 0 ? 'pos' : 'neg';
        }

        function fmtTime(value) {
            if (!value) return '-';
            const d = new Date(value);
            if (isNaN(d.getTime())) return value;
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text || '';
        }

        async function loadSnapshots() {
            const mode = document.getElementById('runMode').value;
            const type = document.getElementById('productType').value;
            const date = document.getElementById('dateInput').value || todayStr();
            const path = `json/${mode}/${type}/${date}/_strategy_snapshots_15m.json?t=${Date.now()}`;
            setStatus(`Loading ${path}`);
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                if (text.trim().startsWith('<')) {
                    throw new Error(`No JSON snapshot artifact found for ${type} ${date}.`);
                }
                payload = JSON.parse(text);
                const defaultView = payload.default_view || 'strategy';
                document.getElementById('viewMode').value = defaultView === 'product' ? 'product' : 'strategy';
                selectedIndex = Math.max(0, (payload.snapshots || []).length - 1);
                render();
                setStatus('');
            } catch (err) {
                payload = null;
                document.getElementById('snapshotStrip').innerHTML = '';
                document.getElementById('summaryGrid').innerHTML = '';
                document.getElementById('tableHead').innerHTML = '';
                document.getElementById('tableBody').innerHTML = '';
                document.getElementById('btnLoadMoreSnaps').style.display = 'none';
                document.getElementById('snapshotRenderStatus').innerText = '';
                setStatus(`Unable to load snapshot artifact. ${err.message}`);
            }
        }

        function selectSnapshot(index) {
            if (!payload) return;
            selectedIndex = Math.max(0, Math.min(index, payload.snapshots.length - 1));
            render();
        }

        function selectAdjacent(delta) {
            selectSnapshot(selectedIndex + delta);
        }

        function setGroup(group) {
            document.getElementById('groupFilter').value = group;
            render();
        }

        function changeSort(key) {
            if (sortKey === key) sortAsc = !sortAsc;
            else { sortKey = key; sortAsc = false; }
            renderTable();
        }

        function render() {
            if (!payload || !payload.snapshots || payload.snapshots.length === 0) return;
            const snap = payload.snapshots[selectedIndex];
            const strategyCount = (snap.strategy_rows || snap.rows || []).length;
            const productCount = (snap.product_rows || []).length;
            document.getElementById('meta').innerHTML = [
                `Generated: ${payload.generated_at || '--'}`,
                `Source: ${payload.source || '--'}`,
                `Strategy rows: ${strategyCount} / Product rows: ${productCount}`,
                `Snapshots: ${payload.snapshot_count || payload.snapshots.length}`
            ].join('<br>');
            renderSnapshotStrip();
            renderSummary();
            renderTable();
        }

        function renderSnapshotStrip() {
            const strip = document.getElementById('snapshotStrip');
            strip.innerHTML = payload.snapshots.map((snap, idx) => `
                <button class="snap-chip ${idx === selectedIndex ? 'active' : ''}" onclick="selectSnapshot(${idx})">
                    ${fmtTime(snap.time)}
                </button>
            `).join('');
        }

        function renderSummary() {
            const grid = document.getElementById('summaryGrid');
            const snap = payload.snapshots[selectedIndex];
            const active = document.getElementById('groupFilter').value;
            const groups = ['scalper', 'rev_scalper', 'remainder'];
            grid.innerHTML = groups.map(group => {
                const s = (snap.group_summaries || {})[group] || {};
                return `
                    <article class="summary-card ${active === group ? 'active' : ''}" onclick="setGroup('${group}')">
                        <h3>${group}</h3>
                        <div class="net ${pnlClass(s.net)}">${formatMoney(s.net)}</div>
                        <div class="summary-stats">
                            <span>Closed: ${s.closed_count || 0}</span>
                            <span>Open: ${s.open_count || 0}</span>
                            <span>Profit: ${s.profit_count || 0}</span>
                            <span>Loss: ${s.loss_count || 0}</span>
                            <span>Buy P/L: ${s.buy_profit || 0}/${s.buy_loss || 0}</span>
                            <span>Sell P/L: ${s.sell_profit || 0}/${s.sell_loss || 0}</span>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderTable(append = false) {
            const head = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const footerStats = document.getElementById('snapshotRenderStatus');
            const btnLoadMore = document.getElementById('btnLoadMoreSnaps');
            const viewMode = document.getElementById('viewMode').value;

            if (!append) {
                lastSnapPage = 1;
                tbody.innerHTML = '';
            }

            const activeColumns = viewMode === 'product'
                ? [columns[0], columns[1], productColumn, ...columns.slice(2)]
                : columns;

            if (!append) {
                head.innerHTML = `<tr>${activeColumns.map(([key, label, align]) => `
                    <th class="${align || ''}" onclick="changeSort('${key}')">${label}${sortKey === key ? (sortAsc ? ' ▲' : ' ▼') : ''}</th>
                `).join('')}</tr>`;
            }

            const snap = payload.snapshots[selectedIndex];
            if (!snap) return;

            if (!append) {
                const group = document.getElementById('groupFilter').value;
                let rows = getViewRows(snap, viewMode, group);
                rows = decorateRowsWithRankDelta(rows, viewMode, group);
                rows.sort((a, b) => {
                    const av = a[sortKey];
                    const bv = b[sortKey];
                    let result;
                    if (typeof av === 'number' || typeof bv === 'number') result = Number(av || 0) - Number(bv || 0);
                    else result = String(av || '').localeCompare(String(bv || ''));
                    return sortAsc ? result : -result;
                });
                filteredSnapRows = rows;
            }

            const startIndex = (lastSnapPage - 1) * SNAP_PAGE_SIZE;
            const endIndex = startIndex + SNAP_PAGE_SIZE;
            const pageRows = filteredSnapRows.slice(startIndex, endIndex);

            const rowsHtml = pageRows.map(row => `
                <tr class="${row._rankHighlight || ''}" title="${row._rankDeltaTitle || ''}">
                    ${activeColumns.map(([key, , align]) => {
                        let value = row[key];
                        let cls = align || '';
                        if (key === 'snapshot_time') value = fmtTime(value);
                        if (key === 'strategy_group') value = `<span class="group-pill">${value}</span>`;
                        if (key === 'strategy') value = row._displayStrategy || value;
                        if (['profit_net', 'loss_net', 'net'].includes(key)) {
                            cls += ` ${pnlClass(value)}`;
                            value = formatMoney(value);
                        }
                        return `<td class="${cls}">${value ?? ''}</td>`;
                    }).join('')}
                </tr>
            `).join('');

            if (append) {
                tbody.insertAdjacentHTML('beforeend', rowsHtml);
            } else {
                tbody.innerHTML = rowsHtml;
            }

            if (footerStats) footerStats.innerText = `Showing ${Math.min(endIndex, filteredSnapRows.length)} of ${filteredSnapRows.length} rows`;
            if (btnLoadMore) btnLoadMore.style.display = endIndex < filteredSnapRows.length ? 'block' : 'none';

            if (!append) {
                setStatus(`Showing ${filteredSnapRows.length} ${viewMode === 'product' ? 'product-detail' : 'strategy-rollup'} rows for ${fmtTime(snap.time)}.`);
            }
        }

        function loadMoreSnapshots() {
            lastSnapPage++;
            renderTable(true);
        }

        document.getElementById('dateInput').value = todayStr();
        document.getElementById('groupFilter').addEventListener('change', render);
        document.getElementById('viewMode').addEventListener('change', renderTable);
        loadSnapshots();
    </script>
</body>

</html>
