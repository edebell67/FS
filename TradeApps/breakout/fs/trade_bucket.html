<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Buckets - Breakout</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-deep: #080a18;
            --bg-accent: #0f1225;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --emerald: #10b981;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --indigo-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --header-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg-deep) 100%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1720px;
            margin: 0 auto;
            padding: 30px;
            margin-left: 260px;
            transition: margin-left 0.3s ease;
        }

        @media (max-width: 1024px) {
            .container {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .container {
                margin-left: 0;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--header-shadow);
            position: relative;
        }

        .version-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.75em;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgba(245, 158, 11, 0.3);
            font-weight: 700;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 800;
            background: var(--indigo-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1.1em;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            align-items: center;
            justify-content: flex-end;
            padding: 24px 30px;
            background: var(--glass-bg);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        button {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            background: var(--indigo-gradient);
            color: white;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .bucket-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .bucket-card {
            background: var(--glass-bg);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            width: 100%;
        }

        .bucket-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: var(--card-shadow);
            background: rgba(255, 255, 255, 0.05);
        }

        .bucket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .bucket-title {
            font-size: 1.6em;
            font-weight: 800;
            color: var(--amber);
            letter-spacing: -0.5px;
        }

        .bucket-time {
            font-size: 0.85em;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .bucket-stats {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-item.clickable-stat {
            cursor: pointer;
            padding: 10px 12px;
            margin: -10px -12px;
            border-radius: 14px;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-item.clickable-stat:hover {
            background: rgba(99, 102, 241, 0.12);
            box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.18);
            transform: translateY(-1px);
        }

        .stat-hint {
            font-size: 0.72em;
            color: #a5b4fc;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .stat-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.2em;
        }

        .positive {
            color: var(--emerald);
        }

        .negative {
            color: var(--rose);
        }

        .neutral {
            color: var(--text-dim);
        }

        .strategy-list {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 18px;
            padding: 12px;
            border: 1px solid var(--glass-border);
        }

        .strategy-item, .strategy-label-row {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #cbd5e1;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 15px;
            align-items: center;
        }

        .strategy-item:hover {
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        .strategy-col-name {
            text-align: left;
        }

        .strategy-col-num {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
            min-width: 88px;
        }

        .bucket-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--emerald);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        .delete-btn {
            background: rgba(244, 63, 94, 0.1);
            color: var(--rose);
            border: 1px solid rgba(244, 63, 94, 0.3);
            padding: 8px 16px;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: var(--rose);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }

        .trade-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .trade-modal-content {
            background: var(--bg-accent);
            padding: 30px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 1200px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trade-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .trade-table-container {
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
        }

        .trades-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        .trades-table th {
            text-align: left;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.7em;
            letter-spacing: 1px;
            position: sticky;
            top: 0; z-index: 1;
        }

        .trades-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .trades-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .leader-badge {
            color: #fbbf24;
            margin-right: 5px;
            filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.4));
        }
    </style>
</head>

<body class="with-sidebar">
    <div id="sidebar-container"></div>
    <div class="container">
        <div class="header">
            <div class="version-tag">V20260320_1106 FS</div>
            <h1>🎯 Trade Buckets</h1>
            <p>Manage and Monitor Strategy Collections</p>
        </div>
        <div class="controls">
            <button onclick="loadBuckets()"
                style="background: rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); margin-right:auto;">
                <i class="fas fa-sync"></i> Refresh
            </button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: #94a3b8; font-size: 0.9em; font-weight: 500;">Mode:</label>
                <select id="runMode" onchange="loadBuckets()"
                    style="padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); color: #e0e0e0; font-family: 'Inter', sans-serif; cursor: pointer;">
                    <option value="live">Live</option>
                    <option value="sim">Sim</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: #94a3b8; font-size: 0.9em; font-weight: 500;">Date:</label>
                <input type="date" id="bucketDate" onchange="loadBuckets()"
                    style="padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); color: #e0e0e0; font-family: 'Inter', sans-serif; cursor: pointer;">
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: #94a3b8; font-size: 0.9em; font-weight: 500;">Product Type:</label>
                <select id="productTypeSelect" onchange="loadBuckets()"
                    style="padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); color: #e0e0e0; font-family: 'Inter', sans-serif; cursor: pointer;">
                    <option value="forex">forex</option>
                </select>
            </div>
            <button onclick="deleteAllBuckets()" class="delete-btn">
                <i class="fas fa-trash-alt"></i> Delete All
            </button>
        </div>
        <div id="bucketsContainer" class="bucket-grid">
            <div style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 40px;">
                <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Loading Buckets...
            </div>
        </div>
    </div>

    <div id="tradeDrilldownModal" class="trade-modal">
        <div class="trade-modal-content">
            <div class="trade-modal-header">
                <h2 id="tradeModalTitle" style="color: var(--amber); font-size: 1.4em;">Strategy Trades</h2>
                <div style="display:flex; align-items:center; gap:12px;">
                    <label style="display:flex; align-items:center; gap:6px; color:#94a3b8; font-size:0.85em; user-select:none;">
                        <input type="checkbox" id="onlyLTradesToggle" style="width:16px; height:16px; cursor:pointer;">
                        Show only L-TRADES
                    </label>
                    <button class="btn-cancel" onclick="closeTradeModal()" style="padding: 8px 16px;">✕ Close</button>
                </div>
            </div>
            <div class="trade-table-container">
                <table class="trades-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Exit Time</th>
                            <th>ID</th>
                            <th>Dir</th>
                            <th>Status</th>
                            <th>TB Leader</th>
                            <th>Entry</th>
                            <th>Exit</th>
                            <th>Net P&L</th>
                            <th>Alt Net</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="tradeTableBody"></tbody>
                </table>
            </div>
            <div id="drilldownFooter" style="padding-top: 20px; border-top: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; gap: 20px;">
                <span id="drilldownStats" style="color: var(--text-dim); font-size: 0.85em;"></span>
                <button id="btnLoadMore" class="btn-refresh" style="display: none;" onclick="loadMoreTrades()">Load More</button>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = '/api/trade_buckets';
        const JSON_BASE_PATH = 'json';
        let configLoaded = false;
        let lastBuckets = [];
        let lastTradeRows = [];
        let bucketLookup = {};
        let gridLiveCache = {};
        let lastGridLiveRows = [];
        let lastDrilldownTrades = [];
        let lastDrilldownPage = 1;
        const DRILLDOWN_PAGE_SIZE = 50;
        let lastLeadershipWindowsMap = {};
        let lastDrilldownLeaderWindowsMap = {};
        let lastDrilldownMetric = 'net';
        let drilldownForceOnlyL = false;
        let bucketLiveNetContextMap = {};
        let availableProductTypes = ['forex'];
        const tradeDetailStore = {};
        let tradeDetailSeq = 0;
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        function getSelectedProductType() {
            return document.getElementById('productTypeSelect')?.value || 'forex';
        }
        function normalizeDeltaType(deltaTypeRaw) {
            const raw = String(deltaTypeRaw || 'delta2').trim().toLowerCase();
            if (raw === 'delta1') return 'delta1';
            if (raw === 'delta3') return 'delta3';
            return 'delta2';
        }
        function buildProductTypeQuery() {
            return `product_type=${encodeURIComponent(getSelectedProductType())}`;
        }
        function populateProductTypeSelect(configData) {
            const select = document.getElementById('productTypeSelect');
            if (!select) return;
            const defaults = Array.isArray(configData?.product_types) && configData.product_types.length > 0
                ? configData.product_types
                : [configData?.product_type || 'forex'];
            availableProductTypes = [...new Set(defaults.map(v => String(v).trim()).filter(Boolean))];
            if (availableProductTypes.length === 0) availableProductTypes = ['forex'];
            const qProductType = getQueryParam('product_type');
            const preferred = qProductType || configData?.product_type || availableProductTypes[0];
            select.innerHTML = availableProductTypes.map(pt => `<option value="${pt}">${pt}</option>`).join('');
            select.value = availableProductTypes.includes(preferred) ? preferred : availableProductTypes[0];
        }
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize date picker to today
            const dateInput = document.getElementById('bucketDate');
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            // Fetch config to get default run_mode
            try {
                const configResponse = await fetch('config.json');
                if (configResponse.ok) {
                    const configData = await configResponse.json();
                    const defaultMode = (configData.run_mode || 'live').toLowerCase();
                    document.getElementById('runMode').value = defaultMode;
                    populateProductTypeSelect(configData);
                } else {
                    throw new Error('Config response not OK');
                }
            } catch (error) {
                console.warn('Could not load config, defaulting to live mode:', error);
                populateProductTypeSelect({ product_type: 'forex', product_types: ['forex'] });
            }

            // URL params override defaults/config when present.
            const qMode = (getQueryParam('mode') || '').toLowerCase();
            const qDate = getQueryParam('date') || '';
            if (qMode === 'live' || qMode === 'sim') {
                document.getElementById('runMode').value = qMode;
            }
            if (/^\d{4}-\d{2}-\d{2}$/.test(qDate)) {
                document.getElementById('bucketDate').value = qDate;
            }
            configLoaded = true;
            loadBuckets();
            // 2026-01-19 10:43 - V20260119_1043: Auto-refresh every 30 seconds
            setInterval(() => {
                loadBuckets();
            }, 30000); // 30 seconds
        });
        async function loadBuckets() {
            if (!configLoaded) return; // Wait for config to load first
            const container = document.getElementById('bucketsContainer');
            const runMode = document.getElementById('runMode').value;
            const selectedDate = document.getElementById('bucketDate').value;
            const dateToUse = selectedDate || new Date().toISOString().split('T')[0];
            const bucketPath = `${API_BASE}?mode=${runMode}&date=${dateToUse}&${buildProductTypeQuery()}&_=${Date.now()}`;
            try {
                const response = await fetch(bucketPath);
                const text = await response.text();
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} (${bucketPath})`);
                }
                let data = null;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error(`Non-JSON response (${bucketPath})`);
                }
                const buckets = data.buckets || [];
                lastBuckets = buckets;
                try {
                    const leadershipResp = await fetch(`/api/tb_leadership?mode=${encodeURIComponent(runMode)}&date=${encodeURIComponent(dateToUse)}&${buildProductTypeQuery()}&_=${Date.now()}`);
                    const leadershipData = await leadershipResp.json();
                    const leadershipRows = (leadershipResp.ok && leadershipData && Array.isArray(leadershipData.leadership))
                        ? leadershipData.leadership
                        : [];
                    lastLeadershipWindowsMap = buildPersistedLeadershipMap(leadershipRows);
                } catch (e) {
                    console.warn('[trade_bucket] failed loading persistent leadership windows:', e);
                    lastLeadershipWindowsMap = {};
                }
                try {
                    lastGridLiveRows = await getGridLiveEntries(runMode);
                } catch (e) {
                    lastGridLiveRows = [];
                }
                // Fetch same-day trades once so card-level L-Trade Net is calculated from real trade rows.
                try {
                    const tradesResp = await fetch(`/api/trades?mode=${encodeURIComponent(runMode)}&date=${encodeURIComponent(dateToUse)}&${buildProductTypeQuery()}&live_only=false&_=${Date.now()}`);
                    const tradesData = await tradesResp.json();
                    lastTradeRows = (tradesResp.ok && tradesData && Array.isArray(tradesData.trades)) ? tradesData.trades : [];
                } catch (e) {
                    console.warn('[trade_bucket] failed loading trades for live-net aggregation:', e);
                    lastTradeRows = [];
                }
                await preloadBucketLiveNetStats(buckets);
                console.log(`? Loaded ${buckets.length} buckets from ${bucketPath}`);
                renderBuckets(buckets, lastTradeRows, lastLeadershipWindowsMap);
            } catch (error) {
                // Keep existing view if we already have valid buckets (avoid false red screen on transient 404s).
                if (Array.isArray(lastBuckets) && lastBuckets.length > 0) {
                    console.warn(`[trade_bucket] transient load error, retaining last buckets: ${error.message}`);
                    return;
                }
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ef4444; padding: 40px;">
                    <i class="fas fa-exclamation-circle fa-2x"></i><br><br>Error loading buckets: ${error.message}
                </div>`;
            }
        }

        function renderBuckets(buckets, allTrades = [], leaderWindowsMap = {}) {
            const container = document.getElementById('bucketsContainer');
            bucketLookup = {};
            if (!buckets || buckets.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 60px; background: rgba(0,0,0,0.2); border-radius: 16px;">
                    <i class="fas fa-layer-group fa-3x" style="margin-bottom: 15px; opacity: 0.5;"></i>
                    <h3>No Trade Buckets Found</h3>
                    <p>Create a new bucket to start grouping strategies.</p>
                </div>`;
                return;
            }
            container.innerHTML = buckets.map(bucket => {
                bucketLookup[String(bucket.name || '')] = bucket;
                const safeBucketName = String(bucket.name || '').replace(/'/g, "\\'");
                const bucketDeltaMode = normalizeDeltaType(bucket.delta_type);
                const useDelta1 = bucketDeltaMode === 'delta1';
                const useDelta3 = bucketDeltaMode === 'delta3';
                const deltaLabel = useDelta1
                    ? 'Delta 1 (vs Start)'
                    : (useDelta3 ? 'Delta 3 (vs D3 Select)' : 'Delta 2 (vs Create)');
                const leaderKeyObj = getCurrentLeaderKey(bucket);
                const altKeyObj = getCurrentAltNetKey(bucket);
                const mode = bucket.mode ? bucket.mode.toLowerCase() : 'live';

                const liveNetContext = bucketLiveNetContextMap[String(bucket.name || '')]
                    || getBucketLiveNetContext(bucket, allTrades, leaderWindowsMap);
                const bucketLTrades = liveNetContext.trades;
                const bucketLiveNetSum = liveNetContext.sum;
                bucketLiveNetContextMap[String(bucket.name || '')] = liveNetContext;
                
                // [V20260319_2140] Use selected delta for bucket-level total
                const bucketTotalNet = (bucket.strategies || []).reduce((acc, s) => {
                    const val = useDelta1
                        ? parseFloat(s.delta1 || 0)
                        : (useDelta3 ? parseFloat(s.delta3 || 0) : parseFloat(s.delta2 || s.total_net || 0));
                    return acc + val;
                }, 0);
                
                const modeBadge = mode === 'sim' 
                    ? `<span class="badge sim">SIM</span>` 
                    : `<span class="badge live">LIVE</span>`;

                return `
                <div class="bucket-card">
                    <div class="bucket-header">
                        <div class="bucket-info">
                            <div class="bucket-title">${bucket.name}</div>

        /**
         * [V20260205_1645] Drill-down logic
         */
        function isLTradeFromFlags(trade) {
            const asTrue = (v) => v === true || v === 'true' || v === 1 || v === '1';
            return asTrue(trade?.is_l_trade)
                || asTrue(trade?.is_live_trade)
                || asTrue(trade?.live_trade_executed)
                || asTrue(trade?.order_sent_net)
                || asTrue(trade?.order_sent_alt);
        }

        function getTradeDirectionKey(trade) {
            const direction = String(trade?.direction || '').trim().toUpperCase();
            if (direction === 'LONG' || direction === 'BUY') return 'buy';
            if (direction === 'SHORT' || direction === 'SELL') return 'sell';
            return '';
        }

        function isTradeEligibleForMetric(trade, metricRaw = null) {
            const metric = normalizeBucketMetric(metricRaw || 'net');
            const direction = getTradeDirectionKey(trade);
            if (metric === 'buy_net') return direction === 'buy';
            if (metric === 'sell_net') return direction === 'sell';
            return true;
        }

        function isTradeExecutionForMetric(trade, metricRaw = null) {
            const metric = normalizeBucketMetric(metricRaw || 'net');
            const asTrue = (v) => v === true || v === 'true' || v === 1 || v === '1';
            const sentNet = asTrue(trade?.order_sent_net);
            const sentAlt = asTrue(trade?.order_sent_alt);
            const live = asTrue(trade?.is_l_trade) || asTrue(trade?.is_live_trade) || asTrue(trade?.live_trade_executed);
            if (metric === 'alt_net') return sentAlt;
            return sentNet || (!sentAlt && live);
        }

        function getTradePnlValue(trade, metricRaw = null) {
            const metric = normalizeBucketMetric(metricRaw || 'net');
            const rawValue = metric === 'alt_net' ? trade?.alt_net : trade?.net_return;
            const parsed = parseFloat(rawValue || 0);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function isTradeLTrade(trade, metricRaw = null) {
            const explicitLeader = String(trade?.tb_leader || '').trim().toUpperCase();
            if (explicitLeader && explicitLeader !== 'Y') return false;
            return isLTradeFromFlags(trade)
                && isTradeExecutionForMetric(trade, metricRaw)
                && isTradeEligibleForMetric(trade, metricRaw);
        }

        function getBucketTradeMetric(trade) {
            return (String(trade?.source || '').includes('TBALT_') || trade?.trade_alt_net) ? 'alt_net' : 'net';
        }

        function getBucketMetricHintFromTrade(trade, bucketName) {
            const bucket = String(bucketName || '').trim();
            if (!bucket || !trade || typeof trade !== 'object') return null;
            const sourceTag = bucket.startsWith('TB_') ? bucket : `TB_${bucket}`;
            const ctx = trade.grid_live_context_at_block;
            if (!ctx || typeof ctx !== 'object') return null;
            const rows = []
                .concat(Array.isArray(ctx.exact_matches) ? ctx.exact_matches : [])
                .concat(Array.isArray(ctx.product_entries) ? ctx.product_entries : []);
            const hit = rows.find(r => {
                if (!r || typeof r !== 'object') return false;
                const source = String(r.source || '').trim();
                const group = String(r.group || '').trim();
                return source === sourceTag || group === bucket;
            });
            return hit ? normalizeBucketMetric(hit.metric || 'net') : null;
        }

        function getBucketLiveNetContext(bucket, allTrades, leaderWindowsMap = {}) {
            if (!bucket || !Array.isArray(allTrades) || allTrades.length === 0) {
                return { trades: [], sum: 0 };
            }
            const trades = getBucketLTrades(bucket, allTrades)
                .map(t => {
                    const metric = getBucketTradeMetric(t);
                    return {
                        ...t,
                        _bucketMetricOverride: metric,
                    };
                });
            const sum = trades.reduce((acc, t) => acc + getTradePnlValue(t, t._bucketMetricOverride), 0);
            return { trades, sum };
        }

        async function fetchBucketLiveNetContext(bucket) {
            const bucketName = String(bucket?.name || '').trim();
            if (!bucketName) return { trades: [], sum: 0 };
            const runMode = document.getElementById('runMode').value;
            const tradeDate = document.getElementById('bucketDate').value || new Date().toISOString().split('T')[0];
            const since = encodeURIComponent(bucket.start_time || '');
            const url = `/api/trades?mode=${runMode}&date=${tradeDate}&${buildProductTypeQuery()}&live_only=false&since_time=${since}&bucket_name=${encodeURIComponent(bucketName)}&l_only=true`;
            const res = await fetch(url);
            const data = await res.json();
            if (!res.ok || !data.success || !Array.isArray(data.trades)) {
                return { trades: [], sum: 0 };
            }
            const trades = data.trades
                .map(t => ({ ...t, _bucketMetricOverride: 'net' }))
                .sort((a, b) => new Date(b.entry_time) - new Date(a.entry_time));
            const sum = trades.reduce((acc, t) => acc + (parseFloat(t.net_return || 0) || 0), 0);
            return { trades, sum };
        }

        async function refreshBucketLiveNetStats(buckets) {
            if (!Array.isArray(buckets) || buckets.length === 0) return;
            await Promise.all(buckets.map(async (bucket) => {
                const bucketName = String(bucket?.name || '').trim();
                if (!bucketName) return;
                try {
                    const context = await fetchBucketLiveNetContext(bucket);
                    bucketLiveNetContextMap[bucketName] = context;
                    const valueEl = document.getElementById(`liveNetValue_${encodeURIComponent(bucketName)}`);
                    const hintEl = document.getElementById(`liveNetHint_${encodeURIComponent(bucketName)}`);
                    if (valueEl) {
                        valueEl.textContent = context.sum.toFixed(2);
                        valueEl.classList.remove('positive', 'negative');
                        valueEl.classList.add(context.sum >= 0 ? 'positive' : 'negative');
                    }
                    if (hintEl) {
                        hintEl.textContent = `View L-Trades (${context.trades.length})`;
                    }
                } catch (e) {
                    console.warn('[trade_bucket] failed refreshing live net stat for bucket:', bucketName, e);
                }
            }));
        }

        async function preloadBucketLiveNetStats(buckets) {
            bucketLiveNetContextMap = {};
            if (!Array.isArray(buckets) || buckets.length === 0) return;

            modal.innerHTML = `
                <div class="trade-modal-content" style="max-width: 900px;">
                    <div class="trade-modal-header">
                        <h3 style="margin:0;">Trade Details</h3>
                        <button class="btn-cancel" style="padding: 8px 12px;" onclick="closeTradeDetails()">Close</button>
                    </div>
                    <pre id="tradeJsonDetailBody" style="margin:0; padding:12px; max-height:60vh; overflow:auto; background:rgba(2,6,23,0.7); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#cbd5e1; font-size:0.8rem;">Loading full trade file...</pre>
                </div>
            `;
            modal.onclick = (e) => { if (e.target === modal) closeTradeDetails(); };
            document.body.appendChild(modal);
            const body = document.getElementById('tradeJsonDetailBody');
            try {
                if (filename) {
                    const resp = await fetch(`/api/trade_file?mode=${encodeURIComponent(runMode)}&date=${encodeURIComponent(tradeDate)}&filename=${encodeURIComponent(filename)}&${buildProductTypeQuery()}`);
                    const data = await resp.json();
                    if (resp.ok && data && data.success) {
                        body.textContent = JSON.stringify(data.trade_data || data.data || data, null, 2);
                        return;
                    }
                }
                body.textContent = JSON.stringify(trade, null, 2);
            } catch (e) {
                body.textContent = JSON.stringify(trade, null, 2);
            }
        }

        function closeTradeDetails() {
            const modal = document.getElementById('tradeJsonDetailModal');
            if (modal) modal.remove();
        }

        async function showDrilldown(stratKey, startTime, bucketName = '', isLeader = false, metricRaw = 'net') {
            const modal = document.getElementById('tradeDrilldownModal');
            const titleEl = document.getElementById('tradeModalTitle');
            const tableBody = document.getElementById('tradeTableBody');
            const runMode = document.getElementById('runMode').value;
            const tradeDate = document.getElementById('bucketDate').value;
            const btnLoadMore = document.getElementById('btnLoadMore');
            const statsEl = document.getElementById('drilldownStats');
            
            lastDrilldownMetric = normalizeBucketMetric(metricRaw || 'net');
            lastDrilldownPage = 1;
            if (btnLoadMore) btnLoadMore.style.display = 'none';
            if (statsEl) statsEl.innerText = '';

            titleEl.innerText = bucketName
                ? `Trades for ${stratKey} [${bucketName}]`
                : `Trades for ${stratKey}`;
            tableBody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i> Loading trades...</td></tr>';
            modal.style.display = 'flex';

            try {
                // Parse stratKey (format: "Strategy | Product | Metric"), ignoring metric for trade lookup.
                let strategy = stratKey;
                let product = 'all';
                if (stratKey.includes(' | ')) {
                    const parts = stratKey.split(' | ');
                    strategy = parts[0];
                    product = parts[1];
                }

                const bucketContextArg = bucketName ? `&bucket_name=${encodeURIComponent(bucketName)}` : '';
                const url = `/api/trades?mode=${runMode}&date=${tradeDate}&${buildProductTypeQuery()}&strategy=${encodeURIComponent(strategy)}&product=${encodeURIComponent(product)}&since_time=${encodeURIComponent(startTime)}${bucketContextArg}`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.success || !data.trades) {
                    tableBody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--rose);">No trades found since chart start.</td></tr>`;
                    return;
                }

                // Sort trades by entry_time descending
                const trades = data.trades.sort((a, b) => new Date(b.entry_time) - new Date(a.entry_time));

                if (trades.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--text-dim);">No trades found for this strategy since chart start.</td></tr>`;
                    return;
                }
                if (bucketName) {
                    const parsed = parseBucketKey(stratKey);
                    const strategyKey = parsed ? buildStrategyKey(parsed.model, parsed.product) : '';
                    const bucketWindows = lastLeadershipWindowsMap[bucketName] || {};
                    const strategyWindows = strategyKey ? (bucketWindows[strategyKey] || []) : [];
                    if (strategyWindows.length) {
                        trades.forEach(t => {
                            t.tb_leader = isTradeInLeaderWindow(t, { [strategyKey]: strategyWindows }) ? 'Y' : 'N';
                        });
                    }
                }
                lastDrilldownTrades = trades;
                lastDrilldownLeaderWindowsMap = {};
                drilldownForceOnlyL = false;
                const onlyLToggle = document.getElementById('onlyLTradesToggle');
                if (onlyLToggle) onlyLToggle.checked = false;
                renderDrilldownRows(lastDrilldownTrades);

            } catch (e) {
                console.error("Drilldown error:", e);
                tableBody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--rose);">Error: ${e.message}</td></tr>`;
            }
        }

        function closeTradeModal() {
            document.getElementById('tradeDrilldownModal').style.display = 'none';
            lastDrilldownTrades = [];
            lastDrilldownLeaderWindowsMap = {};
            lastDrilldownMetric = 'net';
            drilldownForceOnlyL = false;
        }

        function normalizeModelName(s) {
            return String(s || '').trim().toLowerCase().replace(/\s+/g, '_');
        }

        function normalizeBucketMetric(metricRaw) {
            const metric = String(metricRaw || '').trim().toLowerCase();
            if (['buy', 'buy_net', 'buy_net_return_sum'].includes(metric)) return 'buy_net';
            if (['sell', 'sell_net', 'sell_net_return_sum'].includes(metric)) return 'sell_net';
            if (['alt', 'alt_net', 'alt_net_return_sum'].includes(metric)) return 'alt_net';
            return 'net';
        }

        function getMetricBadge(metricRaw) {
            const metric = normalizeBucketMetric(metricRaw);
            if (metric === 'buy_net') return ' [B]';
            if (metric === 'sell_net') return ' [S]';
            if (metric === 'alt_net') return ' [A]';
            return ' [N]';
        }

        function parseBucketKey(key) {
            const raw = String(key || '');
            const parts = raw.includes(' | ') ? raw.split(' | ') : raw.split('|');
            if (parts.length < 2) return null;

            // [V20260310_1345] Handle "Model | Product | Metric" or "Model | Product"
            const model = normalizeModelName(parts[0]);
            const product = String(parts[1] || '').trim().toUpperCase();
            let metric = 'net';

            if (parts.length >= 3) {
                metric = normalizeBucketMetric(parts[2]);
            }

            return {
                model: model,
                product: product,
                metric: metric
            };
        }

        function parseBucketStrategy(strategy) {
            if (typeof strategy === 'string') {
                const parsed = parseBucketKey(strategy);
                return {
                    key: strategy,
                    displayName: strategy,
                    metric: parsed?.metric || 'net',
                    parsedKey: parsed
                };
            }

            if (strategy && typeof strategy === 'object') {
                const rawKey = String(strategy.key || strategy.strategy || strategy.name || '');
                const parsed = parseBucketKey(rawKey);
                const product = String(strategy.product || parsed?.product || '').trim().toUpperCase();
                const baseName = String(strategy.strategy || strategy.name || rawKey || 'Unknown Strategy').trim();
                const displayName = product && !baseName.includes(`| ${product}`) ? `${baseName} | ${product}` : baseName;
                const fallbackParsed = (product && baseName)
                    ? { model: normalizeModelName(baseName), product, metric: 'net' }
                    : null;
                return {
                    key: rawKey,
                    displayName,
                    metric: normalizeBucketMetric(strategy.metric || parsed?.metric || 'net'),
                    parsedKey: parsed || fallbackParsed
                };
            }

            return {
                key: '',
                displayName: 'Unknown Strategy',
                metric: 'net',
                parsedKey: null
            };
        }

        function resolveStrategyParsedKey(strategyObj, stratKey, displayName) {
            const fromKey = parseBucketKey(stratKey);
            if (fromKey) return fromKey;
            const product = String(strategyObj?.product || '').trim().toUpperCase();
            const modelRaw = String(strategyObj?.strategy || strategyObj?.name || displayName || '').trim();
            if (!product || !modelRaw) return null;
            return { model: normalizeModelName(modelRaw), product };
        }

        function toEpochMs(value) {
            const ms = new Date(value || 0).getTime();
            return Number.isFinite(ms) ? ms : null;
        }

        function buildStrategyKey(model, product) {
            const m = normalizeModelName(model);
            const p = String(product || '').trim().toUpperCase();
            if (!m || !p) return '';
            return `${m}|${p}`;
        }

        function buildLeaderWindowsMap(bucketName, rows) {
            if (!bucketName || !Array.isArray(rows) || rows.length === 0) return {};
            const sourceTag = `TB_${bucketName}`;
            const altSourceTag = `TBALT_${bucketName}`;
            const events = rows
                .filter(r => {
                    if (!r || typeof r !== 'object') return false;
                    const src = String(r.source || '').trim();
                    if (src !== sourceTag && src !== altSourceTag && src !== bucketName) return false;
                    const key = buildStrategyKey(r.model || '', r.product || '');
                    return !!key && Number.isFinite(toEpochMs(r.activated_at));
                })
                .map(r => ({
                    key: buildStrategyKey(r.model || '', r.product || ''),
                    startMs: toEpochMs(r.activated_at),
                    endMsExplicit: toEpochMs(r.deactivated_at || r.deactivate_time || r.ended_at || r.closed_at || r.exit_time || null)
                }))
                .sort((a, b) => a.startMs - b.startMs);

            const windows = {};
            for (let i = 0; i < events.length; i++) {
                const cur = events[i];
                const next = events[i + 1];
                const nextStartMs = next ? next.startMs : null;
                let endMs = Number.isFinite(cur.endMsExplicit) ? cur.endMsExplicit : null;
                if (!Number.isFinite(endMs) && Number.isFinite(nextStartMs) && nextStartMs > cur.startMs) {
                    endMs = nextStartMs;
                }
                if (!Array.isArray(windows[cur.key])) windows[cur.key] = [];
                windows[cur.key].push({ startMs: cur.startMs, endMs });
            }
            return windows;
        }

        function buildPersistedLeadershipMap(leadershipRows) {
            if (!Array.isArray(leadershipRows) || leadershipRows.length === 0) return {};
            const byBucket = {};
            leadershipRows.forEach(bucketRow => {
                const bucketName = String(bucketRow?.bucket || '').trim();
                if (!bucketName) return;
                const windows = {};
                (bucketRow.windows || []).forEach(windowRow => {
                    const parsed = parseBucketKey(String(windowRow?.strategy || '').replace(':', ' | '));
                    if (!parsed) return;
                    const key = buildStrategyKey(parsed.model, parsed.product);
                    const startMs = toEpochMs(windowRow?.start || null);
                    const endMs = toEpochMs(windowRow?.end || null);
                    if (!key || !Number.isFinite(startMs)) return;
                    if (!Array.isArray(windows[key])) windows[key] = [];
                    windows[key].push({ startMs, endMs });
                });
                byBucket[bucketName] = windows;
            });
            return byBucket;
        }

        function isTradeInLeaderWindow(trade, leaderWindowsMap) {
            if (!trade || !leaderWindowsMap || typeof leaderWindowsMap !== 'object') return false;
            const key = buildStrategyKey(
                trade.script_name || trade.app_name || trade.source_strategy || '',
                trade.product || ''
            );
            if (!key || !Array.isArray(leaderWindowsMap[key]) || leaderWindowsMap[key].length === 0) return false;
            const entryMs = toEpochMs(trade.entry_time || trade.time || null);
            if (!Number.isFinite(entryMs)) return false;
            return leaderWindowsMap[key].some(w => {
                if (!w || !Number.isFinite(w.startMs)) return false;
                const afterStart = entryMs >= w.startMs;
                const beforeEnd = !Number.isFinite(w.endMs) || entryMs < w.endMs;
                return afterStart && beforeEnd;
            });
        }

        function getCurrentLeaderKey(bucket) {
            if (!bucket || !Array.isArray(bucket.strategies) || bucket.strategies.length === 0) return null;
            const minDiff = parseFloat(bucket.minimum_difference ?? 5.0) || 0;
            const candidates = bucket.strategies.map((s, idx) => {
                let deltaNet = 0;
                let key = "";
                if (typeof s === 'object' && s !== null) {
                    deltaNet = parseFloat(s.current_total_net || s.current_net_from_chart || 0);
                    key = String(s.key || s.strategy || '');
                } else {
                    key = String(s || '');
                }
                return { idx, deltaNet, key };
            }).sort((a, b) => b.deltaNet - a.deltaNet);

            if (!candidates.length) return null;
            if (candidates.length === 1) {
                return candidates[0].deltaNet >= minDiff ? parseBucketKey(candidates[0].key) : null;
            }
            const top = candidates[0];
            const second = candidates[1];
            if (top.deltaNet >= (second.deltaNet + minDiff)) {
                return parseBucketKey(top.key);
            }
            return null;
        }

        function getCurrentAltNetKey(bucket) {
            const explicit = parseBucketKey(bucket?.alt_trade_key || '');
            if (explicit) return explicit;
            if (!bucket || !Array.isArray(bucket.strategies) || bucket.strategies.length === 0) return null;
            const candidates = bucket.strategies.map((s) => {
                let score = 0;
                let key = '';
                if (typeof s === 'object' && s !== null) {
                    score = parseFloat(s.total_net ?? s.current_total_net ?? 0) || 0;
                    key = String(s.key || s.strategy || '');
                } else {
                    key = String(s || '');
                }
                return { score, key };
            }).sort((a, b) => a.score - b.score);
            if (!candidates.length || candidates[0].score >= 0) return null;
            return parseBucketKey(candidates[0].key);
        }

        async function getGridLiveEntries(runMode) {
            const mode = String(runMode || 'live').toLowerCase();
            if (Array.isArray(gridLiveCache[mode])) return gridLiveCache[mode];
            const resp = await fetch(`/api/grid_live?mode=${encodeURIComponent(mode)}&_=${Date.now()}`);
            const payload = await resp.json();
            const rows = (resp.ok && payload && payload.success && Array.isArray(payload.data)) ? payload.data : [];
            gridLiveCache[mode] = rows;
            return rows;
        }

        async function getLeaderTakeoverTimeMs(bucket, runMode) {
            const leader = getCurrentLeaderKey(bucket);
            if (!leader || !leader.model || !leader.product) return null;
            const bucketName = String(bucket?.name || '').trim();
            if (!bucketName) return null;
            try {
                const rows = await getGridLiveEntries(runMode);
                return getLeaderTakeoverTimeMsFromRows(bucketName, leader, rows);
            } catch (e) {
                console.warn('[trade_bucket] failed loading leader takeover time:', e);
                return null;
            }
        }

        function getLeaderTakeoverTimeMsFromRows(bucketName, leader, rows) {
            if (!bucketName || !leader || !Array.isArray(rows)) return null;
            const sourceTag = `TB_${bucketName}`;
            const row = rows.find(r => {
                if (!r || typeof r !== 'object') return false;
                const src = String(r.source || '').trim();
                if (src !== sourceTag && src !== bucketName) return false;
                const model = normalizeModelName(r.model || '');
                const product = String(r.product || '').trim().toUpperCase();
                return model === leader.model && product === leader.product;
            });
            if (!row || !row.activated_at) return null;
            const ms = new Date(row.activated_at).getTime();
            return Number.isFinite(ms) ? ms : null;
        }

        function tradeMatchesBucketStrategy(trade, parsedKeys) {
            const tradeProduct = String(trade.product || '').trim().toUpperCase();
            const script = normalizeModelName(trade.script_name || trade.app_name || trade.source_strategy || '');
            if (!tradeProduct || !script) return false;

            // [V20260310_1345] Check BOTH Strategy/Product AND Metric eligibility
            return parsedKeys.some(k => {
                if (!k) return false;
                if (k.product !== tradeProduct || script !== k.model) return false;

                // If the bucket item specifies a metric (buy_net/sell_net), the trade must match it
                return isTradeEligibleForMetric(trade, k.metric);
            });
        }

        function getBucketLTrades(bucket, allTrades, options = {}) {
            if (!bucket || !Array.isArray(allTrades) || allTrades.length === 0) return [];
            const parsedKeys = (bucket.strategies || [])
                .map(s => parseBucketKey(typeof s === 'string' ? s : s?.key))
                .filter(Boolean);
            if (!parsedKeys.length) return [];

            const bucketName = String(bucket.name || '').trim();
            const tbName = bucketName.startsWith('TB_') ? bucketName : `TB_${bucketName}`;
            const bucketProducts = new Set(parsedKeys.map(k => String(k.product || '').trim().toUpperCase()).filter(Boolean));
            const bucketStart = new Date(bucket.start_time || 0).getTime();
            return allTrades.filter(t => {
                const entryMs = new Date(t.entry_time || 0).getTime();
                if (bucketStart && entryMs && entryMs < bucketStart) return false;

                // [V20260226_1420] Short-circuit by asserting Product early, avoiding regex on invalid rows
                const tradeProduct = String(t.product || '').trim().toUpperCase();
                if (!tradeProduct || !bucketProducts.has(tradeProduct)) return false;

                if (!isLTradeFromFlags(t)) return false;
                const metricHint = getBucketMetricHintFromTrade(t, bucketName);

                // 1) Exact strategy/product match (preferred).
                if (tradeMatchesBucketStrategy(t, parsedKeys)) {
                    if (metricHint && !isTradeEligibleForMetric(t, metricHint)) return false;
                    return true;
                }

                // 2) Source-group linkage to this bucket name.
                const sourceGroup = String(t.source_group || '');
                if (sourceGroup && (sourceGroup.includes(bucketName) || sourceGroup.includes(tbName))) {
                    if (metricHint && !isTradeEligibleForMetric(t, metricHint)) return false;
                    return true;
                }

                // 3) Explicit trade-bucket screen tagging.
                const sourceScreen = String(t.source_screen || '').toLowerCase();
                if (sourceScreen.includes('trade_bucket')) {
                    if (metricHint && !isTradeEligibleForMetric(t, metricHint)) return false;
                    return true;
                }

                // 4) Fallback for missing strategy metadata:
                // keep product+time scoped live trades so card net aligns with actual L-trade feed.
                const hasStrategyMeta = String(t.script_name || t.app_name || t.source_strategy || '').trim().length > 0;
                if (!hasStrategyMeta) {
                    if (metricHint && !isTradeEligibleForMetric(t, metricHint)) return false;
                    return true;
                }

                return false;
            });
        }

        function showBucketLiveNetDrilldown(bucketNameEncoded) {
            return showBucketLTrades(bucketNameEncoded, 'live_net_sum');
        }

        async function showBucketLTrades(bucketNameEncoded, launchSource = 'footer') {
            const bucketName = decodeURIComponent(String(bucketNameEncoded || ''));
            const bucket = bucketLookup[bucketName];
            if (!bucket) {
                alert(`Bucket not found: ${bucketName}`);
                return;
            }
            const runMode = document.getElementById('runMode').value;
            const tradeDate = document.getElementById('bucketDate').value || new Date().toISOString().split('T')[0];
            const modal = document.getElementById('tradeDrilldownModal');
            const titleEl = document.getElementById('tradeModalTitle');
            const tableBody = document.getElementById('tradeTableBody');
            const btnLoadMore = document.getElementById('btnLoadMore');
            const statsEl = document.getElementById('drilldownStats');
            const launchLabel = String(launchSource || 'footer').toLowerCase() === 'live_net_sum'
                ? 'Live Net Sum'
                : 'Bucket L-Trades';
            const cachedLiveNetContext = bucketLiveNetContextMap[bucketName];
            
            if (btnLoadMore) btnLoadMore.style.display = 'none';
            if (statsEl) statsEl.innerText = '';
            titleEl.innerText = `${launchLabel}: ${bucketName}`;
            tableBody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i> Loading L-trades...</td></tr>';
            modal.style.display = 'flex';

            if (String(launchSource || '').toLowerCase() === 'live_net_sum' && cachedLiveNetContext && cachedLiveNetContext.trades.length > 0) {
                const lTrades = [...cachedLiveNetContext.trades].sort((a, b) => new Date(b.entry_time) - new Date(a.entry_time));
                const lSum = cachedLiveNetContext.sum || 0;
                if (statsEl) {
                    statsEl.innerText = `Sum Net ${lSum.toFixed(2)} across ${lTrades.length} L-trade${lTrades.length === 1 ? '' : 's'}`;
                }
                lastDrilldownTrades = lTrades;
                lastDrilldownLeaderWindowsMap = {};
                drilldownForceOnlyL = true;
                lastDrilldownMetric = 'net';
                const onlyLToggle = document.getElementById('onlyLTradesToggle');
                if (onlyLToggle) onlyLToggle.checked = true;
                renderDrilldownRows(lastDrilldownTrades);
                return;
            }

            try {
                const since = encodeURIComponent(bucket.start_time || '');
                // [V20260424_1945] Optimized: Use server-side L-only filter
                const url = `/api/trades?mode=${runMode}&date=${tradeDate}&${buildProductTypeQuery()}&live_only=false&since_time=${since}&bucket_name=${encodeURIComponent(bucketName)}&l_only=true`;
                const res = await fetch(url);
                const data = await res.json();
                if (!data.success || !Array.isArray(data.trades)) {
                    tableBody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--rose);">No trades found for bucket window.</td></tr>`;
                    return;
                }

                // Server already filtered them if possible
                let lTrades = data.trades;
                lTrades.sort((a, b) => new Date(b.entry_time) - new Date(a.entry_time));

                const lSum = lTrades.reduce((acc, t) => acc + (parseFloat(t.net_return || 0) || 0), 0);
                titleEl.innerText = `${launchLabel}: ${bucketName}`;
                if (statsEl) {
                    statsEl.innerText = `Sum Net ${lSum.toFixed(2)} across ${lTrades.length} L-trade${lTrades.length === 1 ? '' : 's'}`;
                }

                if (!lTrades.length) {
                    tableBody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--text-dim);">No L-trades found for this bucket.</td></tr>`;
                    return;
                }

                lastDrilldownTrades = lTrades;
                lastDrilldownLeaderWindowsMap = {};
                drilldownForceOnlyL = true;
                const onlyLToggle = document.getElementById('onlyLTradesToggle');
                if (onlyLToggle) onlyLToggle.checked = true;
                renderDrilldownRows(lastDrilldownTrades);
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--rose);">Error loading L-trades: ${e.message}</td></tr>`;
            }
        }
        document.addEventListener('change', (e) => {
            if (e.target && e.target.id === 'onlyLTradesToggle' && lastDrilldownTrades.length > 0) {
                renderDrilldownRows(lastDrilldownTrades);
            }
        });
    </script>
