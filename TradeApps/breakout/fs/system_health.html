<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>System Health</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sidebar.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .main-content {
            padding: 2rem;
        }


        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .health-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .health-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-badge.healthy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-badge.unhealthy {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        /* Flashing Animation */
        @keyframes flash-red {
            0% {
                background-color: rgba(239, 68, 68, 0.2);
            }

            50% {
                background-color: rgba(239, 68, 68, 0.5);
            }

            100% {
                background-color: rgba(239, 68, 68, 0.2);
            }
        }

        .alarm {
            animation: flash-red 1s infinite;
            color: var(--danger);
            font-weight: bold;
        }

        /* Text-only alarm for table cells */
        .text-alarm {
            color: var(--danger);
            animation: text-blink-red 1s infinite;
            font-weight: bold;
        }

        @keyframes text-blink-red {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .health-table {
            width: 100%;
            border-collapse: collapse;
        }

        .health-table th,
        .health-table td {
            text-align: left;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .health-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .health-table tr:last-child td {
            border-bottom: none;
        }

        .value-col {
            text-align: right;
            font-family: 'Consolas', monospace;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .refresh-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body class="with-sidebar">
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>System Health Monitor</h1>
            <button class="refresh-btn" onclick="fetchHealth()">Refresh Now</button>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-circle-notch fa-spin"></i> Checking system status...
        </div>

        <div id="content" class="health-grid" style="display: none;">
            <!-- Live Section -->
            <div class="health-card" id="card-live">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-bolt" style="color: #f59e0b;"></i> LIVE
                    </div>
                    <span class="status-badge" id="badge-live">Unknown</span>
                </div>
                <table class="health-table">
                    <thead>
                        <tr>
                            <th>Check</th>
                            <th class="value-col">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-live"></tbody>
                </table>
            </div>

            <!-- Sim Section -->
            <div class="health-card" id="card-sim">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-flask" style="color: #3b82f6;"></i> SIM
                    </div>
                    <span class="status-badge" id="badge-sim">Unknown</span>
                </div>
                <table class="health-table">
                    <thead>
                        <tr>
                            <th>Check</th>
                            <th class="value-col">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-sim"></tbody>
                </table>
            </div>
        </div>

        <div style="margin-top: 1rem; text-align: right; color: var(--text-secondary); font-size: 0.8rem;">
            Last Updated: <span id="last-updated">-</span>
        </div>
    </div>

    <script src="sidebar-loader.js"></script>
    <script>
        async function fetchHealth() {
            const loadEl = document.getElementById('loading');
            const contentEl = document.getElementById('content');

            // Only show loader if content is hidden (first load)
            if (contentEl.style.display === 'none') {
                loadEl.style.display = 'block';
            }

            try {
                // [V20260201_2355] Parallel fetch: Health + Config to determine active mode
                const [healthRes, configRes] = await Promise.all([
                    fetch('/api/system_health?mode=all'),
                    fetch('/api/config')
                ]);

                const healthData = await healthRes.json();
                const configData = await configRes.json();

                // Get active mode (default to empty string if missing)
                const activeRunMode = (configData.success && configData.config && configData.config.run_mode)
                    ? configData.config.run_mode.toLowerCase()
                    : 'live';

                if (healthData.success) {
                    renderHealth('live', healthData.live, activeRunMode === 'live');
                    renderHealth('sim', healthData.sim, activeRunMode === 'sim');

                    document.getElementById('last-updated').textContent = new Date(healthData.timestamp).toLocaleString();

                    // Add visual cue for active mode
                    updateActiveModeHeader(activeRunMode);
                } else {
                    console.error('Failed to fetch health data:', healthData.message);
                }
            } catch (error) {
                console.error('Error:', error);
            } finally {
                loadEl.style.display = 'none';
                contentEl.style.display = 'grid';
            }
        }

        function updateActiveModeHeader(activeMode) {
            // Optional: you could add a global header indicator here
            // For now, we rely on the card opacity/styling
        }

        function renderHealth(mode, data, isActiveMode) {
            const card = document.getElementById(`card-${mode}`);
            const badge = document.getElementById(`badge-${mode}`);
            const table = document.getElementById(`table-${mode}`);

            // [V20260201_2355] Opacity/Dimming for inactive modes
            if (!isActiveMode) {
                card.style.opacity = '0.5';
                card.style.borderColor = 'var(--border)';
            } else {
                card.style.opacity = '1';
                card.style.borderColor = data.healthy ? 'var(--success)' : 'var(--danger)';
            }

            // Badge Logic
            if (data.healthy) {
                badge.className = 'status-badge healthy';
                badge.textContent = 'HEALTHY';
            } else {
                // Only flash red if this is the ACTIVE mode
                if (isActiveMode) {
                    badge.className = 'status-badge unhealthy alarm';
                    badge.textContent = 'ATTENTION';
                } else {
                    badge.className = 'status-badge unhealthy'; // No alarm animation
                    badge.textContent = 'UNHEALTHY (Inactive)';
                }
            }

            // Table Logic
            let html = '';

            // 1. Price Feed
            const feedOk = data.checks.price_feed;
            const latency = data.checks.feed_latency_sec;
            const latencyText = latency > -1 ? `${latency}s ago` : 'N/A';

            // Only show text alarms if active mode
            const alarmClass = isActiveMode ? 'text-alarm' : '';
            const dangerStyle = isActiveMode ? 'color: var(--danger)' : 'color: var(--text-secondary)';

            html += `
            <tr>
                <td>Price Feed Connection</td>
                <td class="value-col ${!feedOk ? alarmClass : ''}" style="${feedOk ? 'color: var(--success)' : ''}">
                    ${feedOk ? 'Active' : 'Offline'}
                </td>
            </tr>
            <tr>
                <td>Feed Latency</td>
                <td class="value-col ${(!feedOk || latency > 300) ? alarmClass : ''}">
                    ${latencyText}
                </td>
            </tr>
        `;

            // 2. Trade Files
            const filesOk = data.checks.trade_files;
            html += `
            <tr>
                <td>Daily Trade Folder</td>
                <td class="value-col ${!filesOk ? alarmClass : ''}" style="${filesOk ? 'color: var(--success)' : ''}">
                    ${filesOk ? 'Found' : 'Missing'}
                </td>
            </tr>
        `;

            // 3. Recency
            const recencyOk = data.checks.trade_recency;
            const age = data.checks.latest_trade_age_min;
            const ageText = age > -1 ? `${age} min` : 'No Data';

            html += `
            <tr>
                <td>Latest Trade Age</td>
                <td class="value-col ${!recencyOk ? alarmClass : ''}">
                    ${ageText}
                </td>
            </tr>
        `;

            table.innerHTML = html;
        }

        // Initial load
        window.addEventListener('DOMContentLoaded', fetchHealth);

        // Auto refresh every 30s
        setInterval(fetchHealth, 30000);
    </script>
</body>

</html>
