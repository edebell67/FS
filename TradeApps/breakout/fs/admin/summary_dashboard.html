<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Summary Dashboard - PG Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #3498db; text-decoration: none; font-weight: bold; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        h1 { color: #263238; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #cfd8dc; }
        th, td { padding: 10px; text-align: left; border: 1px solid #cfd8dc; }
        th { background: #455a64; color: white; }
        .pos { color: #2e7d32; font-weight: bold; }
        .neg { color: #c62828; font-weight: bold; }
        .group-header { background: #f5f5f5; font-weight: bold; }
        .sub-group { padding-left: 30px; font-style: italic; color: #546e7a; }
        .metric-cell { text-align: right; font-family: monospace; }
        .status-open { color: #1976d2; font-weight: bold; }
        .status-closed { color: #757575; }
    </style>
    <script src="/theme.js?v=V20260423_0018" defer></script>
</head>
<body class="breakout-admin-page">
    <a href="index.html" class="back-link">&larr; Back to Admin Suite</a>
    <div class="container">
        <h1>Performance Summary Dashboard</h1>
        <p>Hierarchical grouping of trades and returns (PostgreSQL Live Data).</p>
        
        <table id="summary-table">
            <thead>
                <tr>
                    <th>Product / Model / Strategy</th>
                    <th>Signal</th>
                    <th>Status</th>
                    <th class="metric-cell">Total Net</th>
                    <th class="metric-cell">Alt Net</th>
                    <th class="metric-cell">Trades</th>
                </tr>
            </thead>
            <tbody id="summary-body">
                <!-- Rows -->
            </tbody>
        </table>
    </div>

    <script>
        async function loadSummary() {
            const res = await fetch('/api/admin/summary');
            const data = await res.json();
            const body = document.getElementById('summary-body');
            body.innerHTML = '';

            let currentProduct = null;

            data.forEach(row => {
                // Product Header
                if (row.product !== currentProduct) {
                    const hTr = document.createElement('tr');
                    hTr.className = 'group-header';
                    hTr.innerHTML = `<td colspan="6">${row.product.toUpperCase()}</td>`;
                    body.appendChild(hTr);
                    currentProduct = row.product;
                }

                const tr = document.createElement('tr');
                const netClass = row.total_net >= 0 ? 'pos' : 'neg';
                const altClass = row.total_alt_net >= 0 ? 'pos' : 'neg';
                const statusClass = row.trade_status === 'open' ? 'status-open' : 'status-closed';

                tr.innerHTML = `
                    <td class="sub-group">${row.model} <br><small>${row.strategy_name || ''}</small></td>
                    <td><b>${row.signal.toUpperCase()}</b></td>
                    <td class="${statusClass}">${row.trade_status.toUpperCase()}</td>
                    <td class="metric-cell ${netClass}">${row.total_net.toFixed(2)}</td>
                    <td class="metric-cell ${altClass}">${row.total_alt_net.toFixed(2)}</td>
                    <td class="metric-cell"><b>${row.trade_count}</b></td>
                `;
                body.appendChild(tr);
            });
        }

        loadSummary();
    </script>
</body>
</html>
