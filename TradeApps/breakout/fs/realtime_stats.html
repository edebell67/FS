            document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
                btn.addEventListener('click', () => {
                    executionMode = btn.dataset.mode || 'semi_automatic';
                    manualTradeOpen = executionMode === 'manual';
                    panelFlashMessage = `Execution mode set to ${executionMode.replace('_', ' ')}.`;
                    renderExecutionPanels(lastPayload);
                });
            });

            document.getElementById('tradeLogFilter')?.addEventListener('change', event => {
                tradeLogFilter = event.target.value || 'all';
                renderExecutionPanels(lastPayload);
            });

            document.getElementById('toggleManualTradeBtn')?.addEventListener('click', () => {
                manualTradeOpen = !manualTradeOpen;
                if (manualTradeOpen) executionMode = 'manual';
                panelFlashMessage = manualTradeOpen ? 'Manual trade form opened.' : 'Manual trade form hidden.';
                renderExecutionPanels(lastPayload);
            });

            document.getElementById('acceptTradeBtn')?.addEventListener('click', async () => {
                try {
                    const result = await postExecutionAction('/api/trades/accept', {
                        strategy_group: payload.selected_group,
                        product: payload.selected_product,
                        execution_mode: executionMode,
                        snapshot: payload.snapshot_mode === 'historical' ? payload.snapshot_at : ''
                    });
                    panelFlashMessage = result.message || `${model.action} trade accepted.`;
                    await fetchDashboard();
                } catch (err) {
                    panelFlashMessage = err?.message || `Failed to accept ${model.action} trade.`;
                    renderExecutionPanels(lastPayload);
                }
            });

            document.getElementById('rejectTradeBtn')?.addEventListener('click', async () => {
                try {
                    const result = await postExecutionAction('/api/trades/reject', {
                        strategy_group: payload.selected_group,
                        product: payload.selected_product,
                        execution_mode: executionMode,
                        snapshot: payload.snapshot_mode === 'historical' ? payload.snapshot_at : ''
                    });
                    panelFlashMessage = result.message || `${model.action} suggestion rejected.`;
                    await fetchDashboard();
                } catch (err) {
                    panelFlashMessage = err?.message || `Failed to reject ${model.action} suggestion.`;
                    renderExecutionPanels(lastPayload);
                }
            });

            document.getElementById('manualTradeForm')?.addEventListener('submit', async event => {
                event.preventDefault();
                const direction = document.getElementById('manualDirection')?.value || 'BUY';
                if (direction === 'NO TRADE') {
                    panelFlashMessage = 'Manual no-trade selection is not persisted as an execution record.';
                    renderExecutionPanels(lastPayload);
                    return;
                }
                try {
                    const entryPrice = Number(document.getElementById('manualEntryPrice')?.value || model.entryPrice);
                    const note = document.getElementById('manualNote')?.value || 'Manual trade opened from realtime stats panel.';
                    const result = await postExecutionAction('/api/trades/manual', {
                        strategy_group: payload.selected_group,
                        product: payload.selected_product,
                        direction,
                        entry_price: entryPrice,
                        note,
                        snapshot: payload.snapshot_mode === 'historical' ? payload.snapshot_at : ''
                    });
                    panelFlashMessage = result.message || `Manual ${direction} trade created.`;
                    await fetchDashboard();
                } catch (err) {
                    panelFlashMessage = err?.message || `Failed to create manual ${direction} trade.`;
                    renderExecutionPanels(lastPayload);
                }
            });

            document.getElementById('saveClosePolicyConfigBtn')?.addEventListener('click', async () => {
                const oppositeEnabled = !!document.getElementById('closePolicyOppositeSignal')?.checked;
                const thresholdEnabled = !!document.getElementById('closePolicyNetThreshold')?.checked;
                const thresholdValue = Number(document.getElementById('closePolicyThresholdSelect')?.value || 5);
                const nextConfig = normalizeClosePolicyConfig(lastPayload?.execution_state?.trade_close_config || closePolicyConfig);
                nextConfig.enabled_policies = [];
                if (oppositeEnabled) nextConfig.enabled_policies.push('opposite_signal');
                if (thresholdEnabled) nextConfig.enabled_policies.push('net_pips_after_cost_threshold');
                nextConfig.policies.opposite_signal.enabled = oppositeEnabled;
                nextConfig.policies.net_pips_after_cost_threshold.enabled = thresholdEnabled;
                nextConfig.policies.net_pips_after_cost_threshold.threshold_pips = thresholdValue;
                try {
                    await saveTradeCloseConfig(nextConfig);
                    panelFlashMessage = `Close policy saved: ${nextConfig.enabled_policies.length ? nextConfig.enabled_policies.join(', ') : 'none'}.`;
                    await fetchDashboard({ forceRefresh: snapshotCursor === 'latest' });
                } catch (err) {
                    panelFlashMessage = err?.message || 'Failed to save close policy config.';
                    renderExecutionPanels(lastPayload);
                }
            });
        }

        function renderDashboard(payload) {
            const board = document.getElementById('dashboardBoard');
            if (!payload || !payload.success) {
                board.innerHTML = `<div class="error-state">${escapeHtml(payload?.message || 'Failed to load dashboard data.')}</div>`;
                renderExecutionPanels(payload);
                return;
            }

            const windows = payload.windows || [];
            const rows = payload.rows || [];
            const summary = payload.summary || {};

            board.innerHTML = `
                ${renderTimeHeader(windows, summary)}
                ${rows.map(row => renderMetricRow(row, windows)).join('')}
                <!-- [V20260520_2245] Removed renderSummaryRow call from dashboard -->
                <div class="footer-note">
                    <span class="dot"></span>
                    <span>${escapeHtml(titleizeStrategyGroup(payload.selected_group))} dashboard view · auto-updates every 15 seconds · values shown in USD net return</span>
                </div>
            `;
            renderExecutionPanels(payload);
        }

        function formatSnapshotLabel(snapshotAt, mode) {
            if (!snapshotAt || mode === 'latest') return 'Latest snapshot';
            const ts = new Date(snapshotAt);
            return isNaN(ts.getTime()) ? snapshotAt : ts.toLocaleString();
        }

        function parseSnapshotTime(snapshotAt) {
            const ts = new Date(snapshotAt);
            return isNaN(ts.getTime()) ? null : ts;
        }

        function getCurrentSnapshotIndex() {
            if (!availableSnapshots.length) return -1;
            const currentSnapshot = snapshotCursor === 'latest' ? lastPayload?.snapshot_at : snapshotCursor;
            if (!currentSnapshot) return -1;
            return availableSnapshots.findIndex(item => item.snapshot_at === currentSnapshot);
        }

        function findJumpTargetIndex(currentIndex, deltaMs) {
            if (currentIndex < 0 || currentIndex >= availableSnapshots.length || !deltaMs) return -1;
            const currentSnapshotAt = availableSnapshots[currentIndex]?.snapshot_at;
            const currentTime = parseSnapshotTime(currentSnapshotAt);
            if (!currentTime) return -1;

            const targetTimeMs = currentTime.getTime() + deltaMs;

            if (deltaMs < 0) {
                for (let index = currentIndex - 1; index >= 0; index -= 1) {
                    const candidateTime = parseSnapshotTime(availableSnapshots[index]?.snapshot_at);
                    if (candidateTime && candidateTime.getTime() <= targetTimeMs) {
                        return index;
                    }
                }
                return currentIndex > 0 ? 0 : -1;
            }

            for (let index = currentIndex + 1; index < availableSnapshots.length; index += 1) {
                const candidateTime = parseSnapshotTime(availableSnapshots[index]?.snapshot_at);
                if (candidateTime && candidateTime.getTime() >= targetTimeMs) {
                    return index;
                }
            }
            return currentIndex < availableSnapshots.length - 1 ? availableSnapshots.length - 1 : -1;
        }

        function updateSnapshotControls(payload) {
            availableSnapshots = Array.isArray(payload.snapshots) ? payload.snapshots : [];
            const current = payload.snapshot_mode === 'historical' ? payload.snapshot_at : 'latest';
            snapshotCursor = current || 'latest';

            const label = document.getElementById('snapshotLabel');
            label.textContent = formatSnapshotLabel(payload.snapshot_at, payload.snapshot_mode);

            const currentIndex = availableSnapshots.findIndex(item => item.snapshot_at === payload.snapshot_at);
            const latestIndex = availableSnapshots.length - 1;
            const hourBackIndex = findJumpTargetIndex(currentIndex, -HOUR_MS);
            const dayBackIndex = findJumpTargetIndex(currentIndex, -DAY_MS);
            const hourForwardIndex = findJumpTargetIndex(currentIndex, HOUR_MS);
            const dayForwardIndex = findJumpTargetIndex(currentIndex, DAY_MS);
            document.getElementById('prevSnapshotBtn').disabled = currentIndex <= 0;
            document.getElementById('nextSnapshotBtn').disabled = snapshotCursor === 'latest' || currentIndex < 0 || currentIndex >= latestIndex;
            document.getElementById('prevHourSnapshotBtn').disabled = hourBackIndex < 0;
            document.getElementById('prevDaySnapshotBtn').disabled = dayBackIndex < 0;
            document.getElementById('nextHourSnapshotBtn').disabled = snapshotCursor === 'latest' || hourForwardIndex < 0;
            document.getElementById('nextDaySnapshotBtn').disabled = snapshotCursor === 'latest' || dayForwardIndex < 0;
            document.getElementById('latestSnapshotBtn').disabled = snapshotCursor === 'latest';
        }

        function syncStrategyGroupFilter(groups, selectedValue) {
            const select = document.getElementById('strategyGroupFilter');
            const current = selectedValue ?? select.value ?? 'momentum';
            const options = (groups || []).map(group => {
                const safeKey = escapeHtml(group.key);
                const safeLabel = escapeHtml(group.label);
                const selected = current === group.key ? ' selected' : '';
                return `<option value="${safeKey}"${selected}>${safeLabel}</option>`;
            });
            select.innerHTML = options.join('');
            select.value = current;

            const label = titleizeStrategyGroup(current);
            document.getElementById('dashboardSubline').textContent = current === 'all' ? 'All strategy groups combined' : `${label} strategies only`;
            document.getElementById('statusPillText').textContent = `${label} Real-Time Feed`;
        }

        function syncProductFilter(products, selectedValue) {
            const select = document.getElementById('productFilter');
            const current = selectedValue ?? select.value;
            
            // [V20260521_0240] Ensure the currently selected product is always in the options list,
            // even if it has no trades in the current API response.
            let productList = products || [];
            if (current && current.trim() !== '') {
                const upperCurrent = current.toUpperCase();
                const exists = productList.some(p => p.toUpperCase() === upperCurrent);
                if (!exists) {
                    productList = [...productList, upperCurrent].sort();
                }
            }

            const options = ['<option value="">All Products</option>']
                .concat(productList.map(product => {
                    const safe = escapeHtml(product);
                    const isSelected = current && current.toUpperCase() === product.toUpperCase();
                    const selected = isSelected ? ' selected' : '';
                    return `<option value="${safe}"${selected}>${safe}</option>`;
                }));
            select.innerHTML = options.join('');
            
            // Re-select the correct case-matched value
            const matchedProduct = productList.find(p => current && p.toUpperCase() === current.toUpperCase());
            select.value = matchedProduct || '';
        }

        function setRefreshButtonState(state) {
            const btn = document.getElementById('refreshBtn');
            if (!btn) return;
            btn.classList.toggle('is-loading', !!state.loading);
            btn.classList.toggle('is-pressed', !!state.pressed);
            btn.disabled = !!state.loading;
            btn.setAttribute('aria-busy', state.loading ? 'true' : 'false');
            btn.title = state.loading ? 'Refreshing...' : 'Refresh now';
        }

        async function fetchDashboard(options = {}) {
            if (isRefreshInFlight) return;
            const forceRefresh = !!options.forceRefresh;
            const product = document.getElementById('productFilter').value || '';
            const strategyGroup = document.getElementById('strategyGroupFilter').value || 'momentum';
            // [V20260520_2130] Read scalper type filter; forwarded to API as scalper_type param
            const scalperType = document.getElementById('scalperTypeFilter')?.value || 'all';

            // [V20260605] Check cache for historical snapshots (not 'latest')
            const isHistorical = snapshotCursor && snapshotCursor !== 'latest';
            const cacheKey = isHistorical ? `${snapshotCursor}|${strategyGroup}|${product}|${scalperType}` : null;

            if (isHistorical && !forceRefresh) {
                const cached = getCachedSnapshot(cacheKey);
                if (cached) {
                    // Cache hit - render immediately without API call
                    lastPayload = cached;
                    syncStrategyGroupFilter(cached.strategy_groups || [], strategyGroup);
                    syncProductFilter(cached.products || [], product);
                    updateSnapshotControls(cached);
                    renderDashboard(cached);
                    const ts = cached.last_update ? new Date(cached.last_update) : new Date();
                    document.getElementById('lastUpdated').textContent = `Last update: ${isNaN(ts.getTime()) ? 'unknown' : ts.toLocaleString()} (cached)`;
                    return;
                }
            }

            isRefreshInFlight = true;
            setRefreshButtonState({ loading: true, pressed: false });
            const url = new URL('/api/realtime_stats', API_ORIGIN);
            url.searchParams.set('strategy_group', strategyGroup);
            url.searchParams.set('product', product);
            url.searchParams.set('scalper_type', scalperType); // [V20260520_2130]
            if (isHistorical) {
                url.searchParams.set('snapshot', snapshotCursor);
            } else if (forceRefresh) {
                url.searchParams.set('force_refresh', '1');
            }
            url.searchParams.set('_', Date.now().toString());
            try {
                const response = await fetch(url.toString(), { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} loading realtime stats`);
                }
                const data = await response.json();
                lastPayload = data;

                // [V20260605] Cache historical snapshots for instant navigation
                if (isHistorical && cacheKey) {
                    setCachedSnapshot(cacheKey, data);
                }

                // [V20260521_0015] Use local filter state instead of API's selected_group/selected_product to prevent reset to "All"
                syncStrategyGroupFilter(data.strategy_groups || [], strategyGroup);
                syncProductFilter(data.products || [], product);
                updateSnapshotControls(data);
                renderDashboard(data);

                const lastUpdated = document.getElementById('lastUpdated');
                const ts = data.last_update ? new Date(data.last_update) : new Date();
                lastUpdated.textContent = `Last update: ${isNaN(ts.getTime()) ? 'unknown' : ts.toLocaleString()}`;
            } catch (err) {
                console.error('Realtime stats fetch failed:', err);
                renderDashboard({ success: false, message: err?.message || 'Failed to load realtime stats.' });
                document.getElementById('lastUpdated').textContent = 'Last update: connection error';
            } finally {
                isRefreshInFlight = false;
                setRefreshButtonState({ loading: false, pressed: false });
            }
        }

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            fetchDashboard({ forceRefresh: true });
            refreshTimer = setInterval(() => {
                if (snapshotCursor === 'latest') fetchDashboard({ forceRefresh: true });
            }, AUTO_REFRESH_MS);
        }

        function moveSnapshot(delta) {
            if (!availableSnapshots.length) return;
            const currentIndex = getCurrentSnapshotIndex();
            if (currentIndex < 0) return;
            const nextIndex = currentIndex + delta;
            if (nextIndex < 0 || nextIndex >= availableSnapshots.length) return;
            snapshotCursor = availableSnapshots[nextIndex].snapshot_at;
            fetchDashboard();
        }

        function moveSnapshotByDuration(deltaMs) {
            if (!availableSnapshots.length) return;
            const currentIndex = getCurrentSnapshotIndex();
            const nextIndex = findJumpTargetIndex(currentIndex, deltaMs);
            if (nextIndex < 0 || nextIndex === currentIndex) return;
            snapshotCursor = availableSnapshots[nextIndex].snapshot_at;
            fetchDashboard();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('strategyGroupFilter').addEventListener('change', () => fetchDashboard({ forceRefresh: snapshotCursor === 'latest' }));
            document.getElementById('productFilter').addEventListener('change', () => fetchDashboard({ forceRefresh: snapshotCursor === 'latest' }));
            // [V20260520_2130] Scalper type filter change triggers dashboard refresh
            document.getElementById('scalperTypeFilter').addEventListener('change', () => fetchDashboard({ forceRefresh: snapshotCursor === 'latest' }));
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.addEventListener('pointerdown', () => {
                if (!isRefreshInFlight) setRefreshButtonState({ loading: false, pressed: true });
            });
            refreshBtn.addEventListener('pointerup', () => {
                if (!isRefreshInFlight) setRefreshButtonState({ loading: false, pressed: false });
            });
            refreshBtn.addEventListener('pointerleave', () => {
                if (!isRefreshInFlight) setRefreshButtonState({ loading: false, pressed: false });
            });
            refreshBtn.addEventListener('click', () => fetchDashboard({ forceRefresh: snapshotCursor === 'latest' }));
            document.getElementById('prevDaySnapshotBtn').addEventListener('click', () => moveSnapshotByDuration(-DAY_MS));
            document.getElementById('prevHourSnapshotBtn').addEventListener('click', () => moveSnapshotByDuration(-HOUR_MS));
            document.getElementById('prevSnapshotBtn').addEventListener('click', () => moveSnapshot(-1));
            document.getElementById('nextSnapshotBtn').addEventListener('click', () => moveSnapshot(1));
            document.getElementById('nextHourSnapshotBtn').addEventListener('click', () => moveSnapshotByDuration(HOUR_MS));
            document.getElementById('nextDaySnapshotBtn').addEventListener('click', () => moveSnapshotByDuration(DAY_MS));
            document.getElementById('latestSnapshotBtn').addEventListener('click', () => {
                snapshotCursor = 'latest';
                fetchDashboard({ forceRefresh: true });
            });
            // [V20260512_0430] Load config and start refresh in parallel for faster initial load
            loadHighlightConfig();
            startAutoRefresh();
        });
    </script>
</body>
