<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Trade Viewer - Strategy Performance Dashboard</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .version-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(251, 191, 36, 0.2);
            font-weight: 600;
        }

        /* [V20260206_1245] New Strategy Dashboard Styling */
        .summary-grid {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 40px !important;
            padding: 20px 0 !important;
        }

        /* [V20260210_0145] Section headers for breakdowns */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 40px;
            margin-bottom: 5px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dashboard-card {
            background: rgba(0, 0, 0, 0.4);
            border: 3px solid #fbbf24;
            border-radius: 4px;
            padding: 30px;
            color: #fbbf24;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dashboard-card:hover {
            background: rgba(251, 191, 36, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dashboard-card h3 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: capitalize;
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            padding-bottom: 15px;
        }

        .dashboard-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .dashboard-row .label {
            font-weight: 500;
        }

        .dashboard-row .value {
            font-family: 'Courier New', monospace;
            font-weight: 800;
        }

        .dashboard-row.net-row {
            margin-top: 30px;
            border-top: 1px dashed rgba(251, 191, 36, 0.3);
            padding-top: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .bias-enforcement-badges {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .bias-enforcement-pill {
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.4px;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: rgba(148, 163, 184, 0.12);
            color: #cbd5e1;
        }

        .bias-enforcement-pill.on {
            border-color: rgba(16, 185, 129, 0.55);
            background: rgba(16, 185, 129, 0.16);
            color: #86efac;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85em;
            color: #a0a0a0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select,
        input,
        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        select[multiple] {
            min-height: 120px;
            padding: 8px;
        }

        select[multiple] option {
            padding: 8px;
            margin: 2px 0;
            border-radius: 5px;
            cursor: pointer;
        }

        select[multiple] option:checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        select:hover,
        input:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .summary-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .insights-panel {
            margin: 30px 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(12px);
        }

        .insights-panel h2 {
            margin-bottom: 20px;
            font-size: 1.6em;
            color: #fbbf24;
        }

        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .insight-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .insight-card-header {
            font-size: 1.1em;
            font-weight: 600;
            color: #93c5fd;
        }

        .insight-card-body {
            flex: 1;
        }

        .insight-empty {
            color: #94a3b8;
            font-size: 0.9em;
        }

        .streak-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        .streak-column h4 {
            margin-bottom: 8px;
            color: #e0e7ff;
        }

        .streak-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(148, 163, 184, 0.3);
        }

        .streak-row:last-child {
            border-bottom: none;
        }

        .streak-row-title {
            font-weight: 600;
            color: #f1f5f9;
        }

        .streak-row-meta {
            font-size: 0.8em;
            color: #94a3b8;
        }

        .insight-link {
            background: transparent;
            border: 1px solid rgba(147, 197, 253, 0.6);
            color: #93c5fd;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .insight-link:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .insight-link:hover:not(:disabled) {
            background: rgba(147, 197, 253, 0.15);
        }

        .virtual-summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.9em;
            color: #cbd5f5;
        }

        .virtual-summary span {
            color: #a5b4fc;
            margin-right: 4px;
        }

        .virtual-list {
            margin-top: 10px;
            max-height: 260px;
            overflow-y: auto;
        }

        .virtual-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9em;
        }

        .virtual-row:last-child {
            border-bottom: none;
        }

        .virtual-row.open {
            color: #fbbf24;
        }

        .virtual-row.closed {
            color: #a5f3fc;
        }

        .virtual-title {
            font-weight: 600;
            color: #e2e8f0;
        }

        .virtual-meta {
            font-size: 0.75em;
            color: #94a3b8;
        }

        .virtual-row .pnl {
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .split-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
        }

        .split-row:last-child {
            border-bottom: none;
        }

        .split-title {
            font-weight: 600;
            color: #fef3c7;
        }

        .split-meta {
            font-size: 0.8em;
            color: #94a3b8;
        }

        .split-actions {
            display: flex;
            gap: 6px;
        }

        .strategy-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .strategy-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .strategy-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #667eea;
        }

        .strategy-params {
            font-size: 0.9em;
            color: #a0a0a0;
            font-family: 'Courier New', monospace;
        }

        .trade-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .direction-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .direction-title {
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #b0b0b0;
        }

        .direction-group.buy .direction-title {
            color: #4ade80;
        }

        .direction-group.sell .direction-title {
            color: #f87171;
        }

        /* [V20260101_1950] Auto-selected styling */
        .direction-group.auto-active {
            background: rgba(16, 185, 129, 0.15);
            /* Darker green tint */
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .direction-group.auto-active .direction-title {
            color: #10b981 !important;
            /* Brighter emerald */
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .status-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            gap: 10px;
            padding: 10px 0;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-row:last-child {
            border-bottom: none;
        }

        .status-label {
            font-size: 0.8em;
            font-weight: 500;
            text-transform: uppercase;
            color: #a0a0a0;
        }

        .value {
            text-align: right;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .positive {
            color: #4ade80;
        }

        .negative {
            color: #f87171;
        }

        .neutral {
            color: #fbbf24;
        }

        .direction-title {
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .buy .direction-title {
            color: #4ade80;
        }

        .sell .direction-title {
            color: #f87171;
        }

        .activation-controls {
            font-size: 0.8em;
            color: #e0e0e0;
            display: flex;
            gap: 10px;
            font-weight: 400;
        }

        .activation-controls label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .activation-controls input[type="checkbox"] {
            margin: 0;
            padding: 0;
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .auto-badge {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #22c55e;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.65em;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .activation-controls .manual-pill {
            border: 1px solid rgba(251, 191, 36, 0.4);
            color: #fbbf24;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 0.65em;
            text-transform: uppercase;
        }

        .trade-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 98%;
            margin: 20px auto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
        }

        .modal-header h2 {
            font-size: 1.8em;
            color: #667eea;
        }

        .close-btn {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid #f87171;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #f87171;
            color: white;
            transform: scale(1.05);
        }

        .csv-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        .csv-btn:hover {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transform: scale(1.05);
        }

        .trades-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .trades-table th {
            background: rgba(102, 126, 234, 0.2);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.5);
            white-space: nowrap;
        }

        .trades-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .trades-table tr:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.3em;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .time-playback-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-playback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .time-playback-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
        }

        .time-display {
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            color: #fbbf24;
            font-weight: 600;
        }

        .slider-container {
            margin-bottom: 20px;
        }

        .time-slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fbbf24;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            transition: all 0.3s ease;
        }

        .time-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.8);
        }

        .time-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fbbf24;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            transition: all 0.3s ease;
        }

        .time-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.8);
        }

        .playback-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .playback-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(102, 126, 234, 0.2);
            color: #e0e0e0;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .playback-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .playback-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .speed-display {
            font-size: 0.9em;
            color: #a0a0a0;
            min-width: 60px;
            text-align: center;
        }

        .time-markers {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #808080;
            margin-top: 10px;
        }

        /* Config Modal Styles [2025-12-19 V20251219_0942] */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1a1a2e;
            margin: 3% auto;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 1400px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            padding: 25px 35px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

    <script>
        let currentConfig = null;

        let activeRunMode = 'live';
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                if (data.success) {
                    currentConfig = data.config;
                    activeRunMode = currentConfig.run_mode || 'live';
                    const runModeEl = document.getElementById('runMode');
                    if (runModeEl) runModeEl.value = activeRunMode;
                    updateBiasEnforcementBadges(currentConfig);
                    console.log('Config loaded:', currentConfig, 'Mode:', activeRunMode);
                    // [V20260512_0430] Fire activations load in background (non-blocking)
                    loadActivations();
                }
            } catch (error) {
                console.warn('Config load failed:', error);
            }
        }

        function updateBiasEnforcementBadges(cfg) {
            const entryBadge = document.getElementById('biasEntryBadge');
            const exitBadge = document.getElementById('biasExitBadge');
            if (!entryBadge || !exitBadge) return;
            const entryOn = !!(cfg && cfg.enforce_market_bias);
            const exitOn = !!(cfg && cfg.enforce_market_bias_exit);
            entryBadge.textContent = `Entry Bias: ${entryOn ? 'ON' : 'OFF'}`;
            exitBadge.textContent = `Bias Exit: ${exitOn ? 'ON' : 'OFF'}`;
            entryBadge.classList.toggle('on', entryOn);
            exitBadge.classList.toggle('on', exitOn);
        }

        function jumpToInsights(event) {
            event.preventDefault();
            const panel = document.getElementById('insightsPanel');
            if (panel) {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Set today's date as default
        document.getElementById('tradeDate').valueAsDate = new Date();

        let autoRefreshInterval = null;
        let allTrades = [];
        let virtualTrades = [];
        let activations = {}; // Store activation state

        // ========== TIME PLAYBACK GLOBALS ==========
        let unfilteredTrades = [];
        let minTime = null;
        let maxTime = null;
        let currentFilterTime = null;
        let playbackInterval = null; // Used for setTimeout ID
        let playbackSpeed = 1;
        let currentModalTrades = [];
        let currentModalTitle = '';

        function normalizeProductList(products) {
            if (!products) return [];
            if (typeof products === 'string') return [products.toUpperCase()];
            if (Array.isArray(products)) {
                const normalized = products
                    .map(p => (p ? String(p).toUpperCase() : ''))
                    .filter(Boolean);
                return Array.from(new Set(normalized));
            }
            return [];
        }

        function buildActivationKey(appName, strategy, direction, type) {
            // [V20251231_0354] Include strategy parameters in key if present
            if (strategy && strategy !== '-') {
                return `${appName}_${strategy}_${direction}_${type}`;
            }
            return `${appName}_${direction}_${type}`;
        }

        function normalizeActivationValue(value) {
            if (typeof value === 'object' && value !== null) {
                return {
                    active: !!value.active,
                    activated_at: value.activated_at || null,
                    manual: !!value.manual,
                    products: normalizeProductList(value.products || value.product)
                };
            }
            return { active: !!value, activated_at: null, manual: false, products: [] };
        }

        function isActivationActive(value, product) {
            if (typeof value === 'object' && value !== null) {
                if (!value.active) return false;
                const scoped = normalizeProductList(value.products);
                if (scoped.length === 0) return true;
                if (!product) return false;
                return scoped.includes(String(product).toUpperCase());
            }
            return !!value;
        }

        function setActivationState(key, isActive, options = {}) {
            const existing = activations[key] || {};
            const manual = options.manual !== undefined ? !!options.manual : !!existing.manual;
            const timestamp = options.timestamp || existing.activated_at || null;
            const optionProducts = normalizeProductList(options.products || (options.product ? [options.product] : []));
            const currentProducts = new Set((existing.products || []).map(p => String(p).toUpperCase()));

            if (optionProducts.length) {
                if (isActive) {
                    optionProducts.forEach(p => currentProducts.add(p));
                } else {
                    optionProducts.forEach(p => currentProducts.delete(p));
                }
            } else if (!isActive) {
                currentProducts.clear();
            }

            const productArray = Array.from(currentProducts);
            const resolvedActive = productArray.length > 0 ? true : !!isActive;
            activations[key] = {
                active: resolvedActive,
                activated_at: resolvedActive ? (timestamp || new Date().toISOString()) : null,
                manual: manual,
                products: productArray
            };

            if (!activations[key].active) {
                activations[key].activated_at = null;
            }
            return activations[key];
        }

        async function loadActivations() {
            try {
                const mode = activeRunMode;
                // [V20251231_0354] Pass mode parameter to API
                const response = await fetch(`/api/activations?mode=${mode}`);
                const data = await response.json();
                if (data.success) {
                    const normalized = {};
                    Object.entries(data.activations || {}).forEach(([key, value]) => {
                        normalized[key] = normalizeActivationValue(value);
                    });
                    activations = normalized;
                    console.log(`Activations loaded for ${mode}:`, activations);
                }
            } catch (error) {
                console.error('Error loading activations:', error);
            }
        }


        async function toggleActivation(appName, strategy, product, direction, type, sourceEl = null) {
            const key = buildActivationKey(appName, strategy, direction, type);
            let isChecked = false;
            if (sourceEl) {
                isChecked = sourceEl.checked;
            } else {
                const firstMatch = document.querySelector(`[data-activation-key="${key}"]`);
                if (firstMatch) {
                    isChecked = firstMatch.checked;
                }
            }

            setActivationState(key, isChecked, { manual: true, products: product ? [product] : [] });

            const syncCheckboxes = (state) => {
                document.querySelectorAll(`[data-activation-key="${key}"]`).forEach(cb => {
                    if (cb !== sourceEl) {
                        cb.checked = state;
                    }
                });
            };

            setActivationState(key, isChecked, { product: product });

            try {
                const response = await fetch('/api/activations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: activeRunMode, // [V20251231_0354] Include current mode
                        [key]: activations[key]
                    })
                });
                syncCheckboxes(isChecked);
                console.log(`Updated activation: ${key} = ${isChecked}`);
            } catch (error) {
                console.error('Error updating activation:', error);
                const newState = !isChecked;
                if (sourceEl) {
                    sourceEl.checked = newState;
                }
                setActivationState(key, newState, { manual: true, products: product ? [product] : [] });
                syncCheckboxes(newState);
            }
        }
        async function fetchVirtualTrades(runMode, date) {
            try {
                const url = `/api/virtual_trades?mode=${runMode}&date=${date}`;
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Virtual trades API returned ${response.status}`);
                }
                const payload = await response.json();
                if (payload.success && Array.isArray(payload.trades)) {
                    virtualTrades = payload.trades;
                } else {
                    virtualTrades = [];
                }
            } catch (error) {
                console.warn('Failed to load virtual trades:', error);
                virtualTrades = [];
            }
            return virtualTrades;
        }

        async function loadTrades(isBackground = false) {
            const runMode = document.getElementById('runMode').value;
            const date = document.getElementById('tradeDate').value;

            // Get selected strategies (multi-select)
            const strategySelect = document.getElementById('strategyFilter');
            const selectedStrategies = Array.from(strategySelect.selectedOptions).map(opt => opt.value);

            // Get selected parameters (multi-select)
            const paramsSelect = document.getElementById('paramsFilter');
            const selectedParams = Array.from(paramsSelect.selectedOptions).map(opt => opt.value);

            if (!date) {
                alert('Please select a date');
                return;
            }

            const summaryGrid = document.getElementById('summaryGrid');
            if (!isBackground) {
                summaryGrid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading trades...</p></div>';
            }

            try {
                // For API call, use first strategy or 'all' if none selected
                const apiStrategyFilter = selectedStrategies.length > 0 ? selectedStrategies[0] : 'all';
                const apiUrl = `/api/trades?mode=${runMode}&date=${date}&strategy=${apiStrategyFilter}`;

                // [V20260512_0430] Parallelize trades and virtual_trades fetch
                const [response, _] = await Promise.all([
                    fetch(apiUrl),
                    fetchVirtualTrades(runMode, date)
                ]);

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Failed to load trades');
                }

                // Update version if provided by API
                if (data.version) {
                    document.getElementById('appVersion').textContent = data.version;
                }

                if (data.trades.length === 0) {
                    summaryGrid.innerHTML = '<div class="loading"><p>No trades found for selected date and filters</p></div>';
                    document.getElementById('statsSummary').innerHTML = '';
                    document.getElementById('timePlaybackContainer').style.display = 'none';
                    renderAdvancedInsights([], virtualTrades);
                    return;
                }

                // Check for data changes in background mode
                if (isBackground && JSON.stringify(data.trades) === JSON.stringify(allTrades)) {
                    console.log('No new data, skipping refresh');
                    return;
                }

                allTrades = data.trades;

                // Populate dynamic filters
                populateProductFilter(data.trades);
                populateParameterFilter(data.trades);

                // Get selected products (multi-select)
                const productSelect = document.getElementById('productFilter');
                const selectedProducts = Array.from(productSelect.selectedOptions).map(opt => opt.value);

                // Apply client-side filters for multiple selections
                let filteredTrades = data.trades;

                // Filter by selected products (if any selected and not "all")
                if (selectedProducts.length > 0 && !selectedProducts.includes('all')) {
                    const normalizedProducts = selectedProducts.map(p => p.toLowerCase());
                    filteredTrades = filteredTrades.filter(trade =>
                        normalizedProducts.includes((trade.product || '').toLowerCase())
                    );
                }

                // Filter by selected strategies (if any selected and not "all")
                if (selectedStrategies.length > 0 && !selectedStrategies.includes('all')) {
                    filteredTrades = filteredTrades.filter(trade =>
                        selectedStrategies.includes(trade.app_name)
                    );
                }

                // Filter by selected parameters (if any selected and not "all")
                if (selectedParams.length > 0 && !selectedParams.includes('all')) {
                    filteredTrades = filteredTrades.filter(trade =>
                        selectedParams.includes(trade.strategy)
                    );
                }

                if (filteredTrades.length === 0) {
                    summaryGrid.innerHTML = '<div class="loading"><p>No trades found matching selected filters</p></div>';
                    document.getElementById('statsSummary').innerHTML = '';
                    document.getElementById('timePlaybackContainer').style.display = 'none';
                    renderAdvancedInsights([], virtualTrades);
                    return;
                }

                // Initialize time playback with filtered trades
                initializeTimePlayback(filteredTrades);
                renderSummary(filteredTrades);
                renderStats(filteredTrades);
                renderAdvancedInsights(filteredTrades, virtualTrades);

            } catch (error) {
                console.error('Error loading trades:', error);
                if (!isBackground) {
                    summaryGrid.innerHTML = `
                        <div class="loading">
                            <p style="color: #f87171;">❌ Error loading trades</p>
                            <p style="font-size: 0.9em; color: #a0a0a0; margin-top: 10px;">${error.message}</p>
                            <p style="font-size: 0.85em; color: #808080; margin-top: 15px;">
                                Make sure the API server is running:<br>
                                <code style="background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 5px; display: inline-block; margin-top: 5px;">
                                    python trade_viewer_api.py
                                </code>
                            </p>
                        </div>
                    `;
                }
                virtualTrades = [];
                renderAdvancedInsights([], []);
            }
        }

        function populateProductFilter(trades) {
            const productSelect = document.getElementById('productFilter');
            const currentValues = Array.from(productSelect.selectedOptions).map(opt => opt.value);

            // Get unique products from trades
            const uniqueProducts = new Set();
            trades.forEach(trade => {
                if (trade.product) {
                    uniqueProducts.add(trade.product.toUpperCase());
                }
            });

            // Sort products
            const sortedProducts = Array.from(uniqueProducts).sort();

            // Rebuild dropdown
            productSelect.innerHTML = '<option value="all">All Products</option>';
            sortedProducts.forEach(product => {
                const option = document.createElement('option');
                option.value = product;
                option.textContent = product;
                productSelect.appendChild(option);
            });

            // Restore previous selection if it still exists
            Array.from(productSelect.options).forEach(option => {
                if (currentValues.includes(option.value)) {
                    option.selected = true;
                }
            });

            // If nothing selected, default to 'all'
            if (productSelect.selectedIndex === -1) {
                productSelect.options[0].selected = true;
            }

            console.log('Product filter populated with:', sortedProducts);
        }

        function populateParameterFilter(trades) {
            const paramsSelect = document.getElementById('paramsFilter');
            const currentValue = paramsSelect.value;

            // Get unique strategy parameters from trades
            const uniqueParams = new Set();
            trades.forEach(trade => {
                if (trade.strategy) {
                    uniqueParams.add(trade.strategy);
                }
            });

            // Sort parameters
            const sortedParams = Array.from(uniqueParams).sort();

            // Rebuild dropdown
            paramsSelect.innerHTML = '<option value="all">All Parameters</option>';
            sortedParams.forEach(param => {
                const option = document.createElement('option');
                option.value = param;
                option.textContent = `{${param}}`;
                paramsSelect.appendChild(option);
            });

            // Restore previous selection if it still exists
            if (currentValue !== 'all' && sortedParams.includes(currentValue)) {
                paramsSelect.value = currentValue;
            }

            console.log('Parameter filter populated with:', sortedParams);
        }

        function groupTrades(trades) {
            const grouped = {};

            trades.forEach(trade => {
                const product = (trade.product || 'UNKNOWN').toUpperCase();
                const key = `${trade.app_name}_${product}_${trade.strategy}`;
                if (!grouped[key]) {
                    grouped[key] = {
                        app_name: trade.app_name,
                        product: product,
                        strategy: trade.strategy,
                        buy_closed: { net: 0, alt: 0, liveNet: 0, liveAlt: 0, count: 0, trades: [] },
                        buy_open: { net: 0, alt: 0, liveNet: 0, liveAlt: 0, count: 0, trades: [] },
                        sell_closed: { net: 0, alt: 0, liveNet: 0, liveAlt: 0, count: 0, trades: [] },
                        sell_open: { net: 0, alt: 0, liveNet: 0, liveAlt: 0, count: 0, trades: [] },
                        all_trades: []
                    };
                }

                grouped[key].all_trades.push(trade);

                const direction = (trade.direction || 'LONG').toLowerCase().includes('long') ? 'buy' : 'sell';
                const status = (trade.status || 'OPEN').toLowerCase();
                const key2 = `${direction}_${status}`;

                if (grouped[key][key2]) {
                    grouped[key][key2].net += trade.net_return || 0;
                    grouped[key][key2].alt += trade.alt_net || 0;

                    if (trade.order_sent_net) grouped[key][key2].liveNet += trade.net_return || 0;
                    if (trade.order_sent_alt) grouped[key][key2].liveAlt += trade.alt_net || 0;
                    // Fallback for old data: if is_live_trade is true but flags missing, assume Net? 
                    // No, safer to ignore or rely on new data. 
                    // If is_live_trade is true and BOTH flags undefined, maybe count as Net? 
                    // Let's stick to explicit flags for accuracy.

                    grouped[key][key2].count += 1;
                    grouped[key][key2].trades.push(trade);
                }
            });

            return grouped;
        }

        function renderSummary(trades) {

                if (cat && stats[cat]) {
                    groupedByCat[cat].push(trade);
                    if (isBuy) { stats[cat].buys++; stats[cat].buyNet += net; }
                    else { stats[cat].sells++; stats[cat].sellNet += net; }

                // Dimension B: Window Sizes (2, 3, 4)
                const windowMatch = (trade.app_name || '').match(/_(\d+)_tp/);

                const ws = windowStats[windowSize];

                else { ws.sells++; ws.sellNet += net; }

                // Dimension C: TP/SL Config
                const tpMatch = (trade.app_name || '').match(/tp([\d\.]+)/);

                const tpSl = (tpMatch && slMatch) ? `${tpMatch[1]}/${slMatch[1]}` : 'Other';
                if (!tpSlStats[tpSl]) tpSlStats[tpSl] = { buys: 0, sells: 0, buyNet: 0, sellNet: 0, trades: [] };
                const ts = tpSlStats[tpSl];
                ts.trades.push(trade);
                if (isBuy) { ts.buys++; ts.buyNet += net; }

            const createCollapsibleSection = (title, openByDefault = true) => {

            const renderMarketUpdateSection = async () => {
                const section = createCollapsibleSection('📰 Periodic Market Update', false);
                section.innerHTML = '<div class="dashboard-card" style="grid-column: span 4;"><h3>Loading update...</h3></div>';
                try {
                    const mode = document.getElementById('runMode').value || 'live';
                    const date = document.getElementById('tradeDate').value || new Date().toISOString().slice(0, 10);
                    const resp = await fetch(`/api/market_update?mode=${encodeURIComponent(mode)}&date=${encodeURIComponent(date)}&_t=${Date.now()}`);
                    const data = await resp.json();
                    if (!data.success || !data.exists || !data.update) {
                        section.innerHTML = '<div class="dashboard-card" style="grid-column: span 4;"><h3>No market update yet</h3><div class="dashboard-row"><span class="label">Status</span><span class="value">Waiting for periodic generation</span></div></div>';
                        return;
                    }
                    const u = data.update;
                    const totals = u.totals || {};
                    const last30 = (u.windows || {}).last_30m || {};
                    const prev30 = (u.windows || {}).prev_30m || {};
                    section.innerHTML = `
                        <div class="dashboard-card" style="grid-column: span 4;">
                            <h3>${u.headline || 'Market Update'}</h3>
                            <div class="dashboard-row"><span class="label">History</span><span class="value"><a href="market_updates.html" style="color:#93c5fd;">Open full history & mobile digest</a></span></div>
                            <div class="dashboard-row"><span class="label">Created</span><span class="value">${u.created_at || '--'}</span></div>
                            <div class="dashboard-row"><span class="label">Bias / Condition</span><span class="value">${u.bias || 'N/A'} / ${u.market_condition || 'UNKNOWN'}</span></div>
                            <div class="dashboard-row"><span class="label">Calc Nets (Buy/Sell)</span><span class="value">$${Number(totals.buy_net || 0).toFixed(2)} / $${Number(totals.sell_net || 0).toFixed(2)}</span></div>
                            <div class="dashboard-row"><span class="label">Imbalance</span><span class="value">$${Number(totals.imbalance || 0).toFixed(2)}</span></div>
                            <div class="dashboard-row"><span class="label">Last 30m (Buy/Sell)</span><span class="value">$${Number(last30.buy_net || 0).toFixed(2)} / $${Number(last30.sell_net || 0).toFixed(2)}</span></div>
                            <div class="dashboard-row"><span class="label">Prev 30m (Buy/Sell)</span><span class="value">$${Number(prev30.buy_net || 0).toFixed(2)} / $${Number(prev30.sell_net || 0).toFixed(2)}</span></div>
                            <div class="dashboard-row"><span class="label">Narrative</span><span class="value">${u.narrative || '--'}</span></div>
                            <div class="dashboard-row"><span class="label">Forecast</span><span class="value">${u.forecast || '--'}</span></div>
                        </div>
                    `;
                } catch (err) {
                    section.innerHTML = `<div class="dashboard-card" style="grid-column: span 4;"><h3>Market update error</h3><div class="dashboard-row"><span class="label">Error</span><span class="value">${err.message || err}</span></div></div>`;
                }
            };

            // --- NEW SECTION: PRD DASHBOARD SUMMARY ---
            const prdContent = createCollapsibleSection('📋 PRD Dashboard Summary', false);
            const isLTrade = (t) => !!(t && (t.is_live_trade === true || t.order_sent_net === true || t.order_sent_alt === true));
            const tradeDir = (t) => ((t.direction || 'LONG').toUpperCase().includes('SHORT') ? 'SELL' : 'BUY');
            const latestByEntry = [...trades]
                .filter(t => t && t.entry_time)
                .sort((a, b) => new Date(b.entry_time) - new Date(a.entry_time));
            const marketBias = latestByEntry.length ? String(latestByEntry[0].market_bias_latest || latestByEntry[0].market_bias_at_open || 'UNKNOWN').toUpperCase() : 'UNKNOWN';

            const lTrades = trades.filter(isLTrade);
            const lOpen = lTrades.filter(t => String(t.status || '').toUpperCase() === 'OPEN');
            const lOpenNet = lOpen.reduce((s, t) => s + Number(t.net_return || 0), 0);

            const restricted = lTrades.filter(t => {
                if (marketBias !== 'BUY' && marketBias !== 'SELL') return false;
                return tradeDir(t) === marketBias;
            });
            const nonBias = lTrades.filter(t => !restricted.includes(t));

            const summarizeSide = (arr, side) => {
                const sideRows = arr.filter(t => tradeDir(t) === side);
                return {
                    count: sideRows.length,
                    net: sideRows.reduce((s, t) => s + Number(t.net_return || 0), 0)
                };
            };

            const aggregateByStrategy = (arr, scalperOnly = false) => {
                const map = {};
                arr.forEach(t => {
                    const app = String(t.app_name || t.script_name || 'UNKNOWN');
                    if (scalperOnly) {
                        const tp = /tp([\d.]+)/i.exec(app);
                        const sl = /sl([\d.]+)/i.exec(app);
                        const tpV = tp ? parseFloat(tp[1]) : 0;
                        const slV = sl ? parseFloat(sl[1]) : 0;
                        if (!(tpV > 0 && slV >= tpV * 5)) return;
                    }
                    if (!map[app]) map[app] = { strategy: app, count: 0, wins: 0, net: 0 };
                    map[app].count += 1;
                    if (Number(t.net_return || 0) > 0) map[app].wins += 1;
                    map[app].net += Number(t.net_return || 0);
                });
                return Object.values(map)
                    .map(x => ({ ...x, profitability: x.count > 0 ? (x.wins / x.count) * 100 : 0 }))
                    .sort((a, b) => b.net - a.net);
            };

            const closed = trades.filter(t => String(t.status || '').toUpperCase() === 'CLOSED');
            const top5 = aggregateByStrategy(closed, false).slice(0, 5);
            const scalperTop5 = aggregateByStrategy(closed, true).slice(0, 5);
            const top100 = aggregateByStrategy(closed, false)
                .filter(x => x.count > 0 && x.profitability >= 100)
                .slice(0, 10);

            const openTrades = trades.filter(t => String(t.status || '').toUpperCase() === 'OPEN');
            const openBuy = openTrades.filter(t => tradeDir(t) === 'BUY');
            const openSell = openTrades.filter(t => tradeDir(t) === 'SELL');
            const openBuyNet = openBuy.reduce((s, t) => s + Number(t.net_return || 0), 0);
            const openSellNet = openSell.reduce((s, t) => s + Number(t.net_return || 0), 0);
            const openBuyProf = openBuy.length ? (openBuy.filter(t => Number(t.net_return || 0) > 0).length / openBuy.length) * 100 : 0;
            const openSellProf = openSell.length ? (openSell.filter(t => Number(t.net_return || 0) > 0).length / openSell.length) * 100 : 0;

            const nowMs = Date.now();
            const last30 = closed.filter(t => t.exit_time && ((nowMs - new Date(t.exit_time).getTime()) <= 30 * 60 * 1000));
            const prev30 = closed.filter(t => t.exit_time && ((nowMs - new Date(t.exit_time).getTime()) > 30 * 60 * 1000) && ((nowMs - new Date(t.exit_time).getTime()) <= 60 * 60 * 1000));
            const blockStats = (arr) => {
                const b = arr.filter(t => tradeDir(t) === 'BUY');
                const s = arr.filter(t => tradeDir(t) === 'SELL');
                const bNet = b.reduce((x, t) => x + Number(t.net_return || 0), 0);
                const sNet = s.reduce((x, t) => x + Number(t.net_return || 0), 0);
                const bPos = b.length ? (b.filter(t => Number(t.net_return || 0) > 0).length / b.length) * 100 : 0;
                const sPos = s.length ? (s.filter(t => Number(t.net_return || 0) > 0).length / s.length) * 100 : 0;
                return { b, s, bNet, sNet, bPos, sPos };
            };
            const last30s = blockStats(last30);
            const prev30s = blockStats(prev30);

            const restrictedBuy = summarizeSide(restricted, 'BUY');
            const restrictedSell = summarizeSide(restricted, 'SELL');
            const nonBiasBuy = summarizeSide(nonBias, 'BUY');
            const nonBiasSell = summarizeSide(nonBias, 'SELL');

            prdContent.innerHTML = `
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Market Bias: ${marketBias}</h3>
                    <div class="dashboard-row"><span class="label">Bias-Restricted L-Trades</span><span class="value">${restricted.length}</span></div>
                    <div class="dashboard-row"><span class="label">Buy / Net</span><span class="value">${restrictedBuy.count} / $${restrictedBuy.net.toFixed(2)}</span></div>
                    <div class="dashboard-row"><span class="label">Sell / Net</span><span class="value">${restrictedSell.count} / $${restrictedSell.net.toFixed(2)}</span></div>
                    <div class="dashboard-row"><span class="label">L-Trade Open Count</span><span class="value">${lOpen.length}</span></div>
                    <div class="dashboard-row"><span class="label">L-Trade Open Net</span><span class="value">$${lOpenNet.toFixed(2)}</span></div>
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Non-Bias L-Trades</h3>
                    <div class="dashboard-row"><span class="label">Count</span><span class="value">${nonBias.length}</span></div>
                    <div class="dashboard-row"><span class="label">Buy / Net</span><span class="value">${nonBiasBuy.count} / $${nonBiasBuy.net.toFixed(2)}</span></div>
                    <div class="dashboard-row"><span class="label">Sell / Net</span><span class="value">${nonBiasSell.count} / $${nonBiasSell.net.toFixed(2)}</span></div>
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Strategy Top 5</h3>
                    ${top5.map(x => `<div class="dashboard-row"><span class="label">${x.strategy}</span><span class="value">${x.count} | ${x.profitability.toFixed(1)}% | $${x.net.toFixed(2)}</span></div>`).join('') || '<div class="dashboard-row"><span class="label">No data</span><span class="value">-</span></div>'}
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Scalper Top 5</h3>
                    ${scalperTop5.map(x => `<div class="dashboard-row"><span class="label">${x.strategy}</span><span class="value">${x.count} | ${x.profitability.toFixed(1)}% | $${x.net.toFixed(2)}</span></div>`).join('') || '<div class="dashboard-row"><span class="label">No data</span><span class="value">-</span></div>'}
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Strategies @ 100% Profitability (${top100.length})</h3>
                    ${top100.map(x => `<div class="dashboard-row"><span class="label">${x.strategy}</span><span class="value">${x.count} trades</span></div>`).join('') || '<div class="dashboard-row"><span class="label">No data</span><span class="value">-</span></div>'}
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>All Open Trades</h3>
                    <div class="dashboard-row"><span class="label">Buy</span><span class="value">${openBuy.length} | $${openBuyNet.toFixed(2)} | ${openBuyProf.toFixed(1)}%</span></div>
                    <div class="dashboard-row"><span class="label">Sell</span><span class="value">${openSell.length} | $${openSellNet.toFixed(2)} | ${openSellProf.toFixed(1)}%</span></div>
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Closed Trades (Most Recent 30m)</h3>
                    <div class="dashboard-row"><span class="label">Buy</span><span class="value">${last30s.b.length} | $${last30s.bNet.toFixed(2)} | ${last30s.bPos.toFixed(1)}%</span></div>
                    <div class="dashboard-row"><span class="label">Sell</span><span class="value">${last30s.s.length} | $${last30s.sNet.toFixed(2)} | ${last30s.sPos.toFixed(1)}%</span></div>
                </div>
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>Closed Trades (Previous 30m)</h3>
                    <div class="dashboard-row"><span class="label">Buy</span><span class="value">${prev30s.b.length} | $${prev30s.bNet.toFixed(2)} | ${prev30s.bPos.toFixed(1)}%</span></div>
                    <div class="dashboard-row"><span class="label">Sell</span><span class="value">${prev30s.s.length} | $${prev30s.sNet.toFixed(2)} | ${prev30s.sPos.toFixed(1)}%</span></div>
                </div>
            `;

            // --- SECTION: PERIODIC NARRATIVE MARKET UPDATE ---
            renderMarketUpdateSection();

            // --- SECTION 1: MAIN CONTEXT (COLLAPSIBLE) ---
            const mainContent = createCollapsibleSection('🛡️ Main Strategy Categories', true);
            categories.forEach(cat => {
                const displayName = cat.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join('_');
                mainContent.appendChild(createCard(displayName, stats[cat], groupedByCat[cat]));
            });

            // --- SECTION 2: WINDOW BREAKDOWN ---
            const windowContent = createCollapsibleSection('📏 Performance by Window Size (2, 3, 4)', true);

            const sortedWindows = Object.keys(windowStats).sort((a, b) => a - b);
            sortedWindows.forEach(ws => {
                const title = ws === 'Other' ? 'Other Sizes' : `Size ${ws}`;
                windowContent.appendChild(createCard(title, windowStats[ws], windowStats[ws].trades));
            });

            // --- SECTION 3: TP:SL BREAKDOWN ---
            const tpslContent = createCollapsibleSection('🎯 Performance by TP : SL Ratio', true);

            // Filter out 'Other' and sort by activity or profit
            const sortedTpSl = Object.keys(tpSlStats)
                .filter(k => k !== 'Other')
                .sort((a, b) => tpSlStats[b].trades.length - tpSlStats[a].trades.length);

            sortedTpSl.slice(0, 8).forEach(ts => {
                tpslContent.appendChild(createCard(`TP:SL ${ts}`, tpSlStats[ts], tpSlStats[ts].trades));
            });


            // 2. [V20251220_0727] Maintain Auto-Check logic for background sync
            const netMode = (currentConfig && currentConfig.net_activation_mode ? currentConfig.net_activation_mode : 'auto').toLowerCase();
            const altMode = (currentConfig && currentConfig.alt_activation_mode ? currentConfig.alt_activation_mode : 'auto').toLowerCase();
            const autoNetEnabled = !!(currentConfig && currentConfig.auto_net_check) && netMode !== 'manual';
            const autoAltEnabled = !!(currentConfig && currentConfig.auto_alt_net_check) && altMode !== 'manual';

            if (autoNetEnabled || autoAltEnabled) {
                // Group by full key for activation check (this uses the original grouping logic internally)
                const granularData = groupTrades(trades);
                const checkedThisSession = new Set();

                Object.values(granularData).forEach(group => {
                    const productCode = group.product;
                    ['buy', 'sell'].forEach(dir => {
                        const closedStats = group[`${dir}_closed`];
                        ['net', 'alt'].forEach(type => {
                            const autoEnabled = type === 'net' ? autoNetEnabled : autoAltEnabled;
                            if (!autoEnabled) return;

                            const key = buildActivationKey(group.app_name, group.strategy, dir, type);
                            if (activations[key] && activations[key].manual) return;

                            const pnlSum = closedStats[type] || 0;
                            const threshold = currentConfig[`auto_${type}_threshold`] || 0;

                            if (pnlSum > threshold && !isActivationActive(activations[key], productCode) && !checkedThisSession.has(key)) {
                                console.log(`[AUTO-CHECK] P&L for ${key} (${pnlSum.toFixed(2)}) is > threshold (${threshold}). Auto-activating...`);
                                setActivationState(key, true, { products: productCode ? [productCode] : [] });
                                checkedThisSession.add(key);
                                fetch('/api/activations', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        mode: activeRunMode,
                                        [key]: activations[key]
                                    })
                                }).catch(err => console.error('Auto-activation failed:', err));
                            }
                        });
                    });
                });
            }

            // Duplicate category block removed; rendered in collapsible Main Strategy Categories section above.
        }

        function renderStatusRow(status, data, direction, appName, strategy, product) {
            const netClass = data.net > 0 ? 'positive' : data.net < 0 ? 'negative' : 'neutral';
            const altClass = data.alt > 0 ? 'positive' : data.alt < 0 ? 'negative' : 'neutral';

            // Escape parameters for safe HTML attribute usage
            const escapedAppName = appName.replace(/'/g, "\\'");
            const escapedStrategy = strategy.replace(/'/g, "\\'");
            const escapedDirection = direction.replace(/'/g, "\\'");
            const escapedStatus = status.replace(/'/g, "\\'");
            const escapedProduct = (product || '').replace(/'/g, "\\'");

            return `
                <div class="status-row">
                    <div class="status-label">${status}</div>
                    <div class="value ${netClass}" 
                         style="cursor: pointer; text-decoration: underline;" 
                         onclick="event.stopPropagation(); showFilteredTrades('${escapedAppName}', '${escapedStrategy}', '${escapedDirection}', '${escapedStatus}', 'net', '${escapedProduct}')">
                        Net: $${data.net.toFixed(2)}
                        ${Math.abs(data.liveNet || 0) > 0.001 ? `<span style="color: #fbbf24; font-size: 0.85em; margin-left: 5px;" title="Live Net Order P&L">(L: $${data.liveNet.toFixed(2)})</span>` : ''}
                    </div>

        function calculateConsecutiveStreaks(trades) {
            const streaks = { net: [], alt: [] };
            const grouped = {};

            (trades || []).forEach(trade => {
                if ((trade.status || '').toUpperCase() !== 'CLOSED') {
                    return;
                }
                const direction = normalizeDirection(trade.direction);
                const product = (trade.product || 'UNKNOWN').toUpperCase();
                const key = `${trade.app_name || 'UNKNOWN'}||${trade.strategy || 'UNKNOWN'}||${product}||${direction}`;
                if (!grouped[key]) {
                    grouped[key] = [];
                }
                grouped[key].push(trade);
            });

            Object.entries(grouped).forEach(([key, items]) => {
                items.sort((a, b) => parseTradeTimestamp(a.exit_time || a.entry_time) - parseTradeTimestamp(b.exit_time || b.entry_time));
                let bestNet = 0;
                let currentNet = 0;
                let bestAlt = 0;
                let currentAlt = 0;

                items.forEach(trade => {
                    const netPositive = Number(trade.net_return || 0) > 0;
                    currentNet = netPositive ? currentNet + 1 : 0;
                    if (currentNet > bestNet) {
                        bestNet = currentNet;
                    }
                    const altPositive = Number(trade.alt_net || 0) > 0;
                    currentAlt = altPositive ? currentAlt + 1 : 0;
                    if (currentAlt > bestAlt) {
                        bestAlt = currentAlt;
                    }
                });

                const [app, strategy, product, direction] = key.split('||');
                if (bestNet > 0) {
                    streaks.net.push({ app, strategy, product, direction, best: bestNet, total: items.length });
                }
                if (bestAlt > 0) {
                    streaks.alt.push({ app, strategy, product, direction, best: bestAlt, total: items.length });
                }
            });

            streaks.net.sort((a, b) => (b.best - a.best) || (b.total - a.total));
            streaks.alt.sort((a, b) => (b.best - a.best) || (b.total - a.total));
            return streaks;
        }

        function normalizeDirection(directionValue) {
            return String(directionValue || 'LONG').toLowerCase().includes('long') ? 'buy' : 'sell';
        }

        function parseTradeTimestamp(value) {
            if (!value) {
                return 0;
            }
            const parsed = Date.parse(value);
            return Number.isNaN(parsed) ? 0 : parsed;
        }

        function renderConsecutiveWinsCard(streaks) {

            sections.forEach(section => {

                if (rows.length === 0) {

                } else {

        function renderVirtualTradesCard(vTrades) {
            const container = document.getElementById('virtualTradesContent');
            if (!container) {
                return;
            }
            container.innerHTML = '';
            const list = vTrades || [];
            if (!list.length) {
                container.innerHTML = '<p class="insight-empty">No virtual trades for the selected filters.</p>';

            }

            const openTrades = list.filter(trade => (trade.status || '').toUpperCase() === 'OPEN');
            const closedTrades = list.filter(trade => (trade.status || '').toUpperCase() === 'CLOSED');
            const summary = document.createElement('div');
            summary.className = 'virtual-summary';
            const counts = [
                { label: 'Open', value: openTrades.length.toString() },
                { label: 'Closed', value: closedTrades.length.toString() }
            ];
            counts.forEach(item => {
                const block = document.createElement('div');

                span.textContent = `${item.label}:`;
                const strong = document.createElement('strong');
                strong.textContent = item.value;
                block.appendChild(span);
                block.appendChild(strong);
                summary.appendChild(block);
            });
            [
                { label: 'Total Net', value: formatPnLValue(sumBy(list, 'net_return')) },
                { label: 'Closed Net', value: formatPnLValue(sumBy(closedTrades, 'net_return')) }
            ].forEach(item => {
                const block = document.createElement('div');
                const span = document.createElement('span');
                span.textContent = `${item.label}:`;
                const strong = document.createElement('strong');
                strong.className = item.value.className;
                strong.textContent = item.value.text;
                block.appendChild(span);
                block.appendChild(strong);
                summary.appendChild(block);
            });

            const entries = document.createElement('div');
            entries.className = 'virtual-list';
            const ordered = [...list].sort((a, b) => parseTradeTimestamp(b.exit_time || b.entry_time) - parseTradeTimestamp(a.exit_time || a.entry_time));
            ordered.slice(0, 6).forEach(trade => {
                const row = document.createElement('div');
                row.className = `virtual-row ${(trade.status || '').toLowerCase()}`;
                const left = document.createElement('div');
                const title = document.createElement('div');
                title.className = 'virtual-title';
                title.textContent = `${(trade.product || 'N/A').toUpperCase()} · ${normalizeDirection(trade.direction).toUpperCase()}`;

                row.appendChild(left);
                row.appendChild(pnlSpan);

            });

            container.appendChild(summary);
            container.appendChild(entries);
        }

        function sumBy(trades, key) {
            return (trades || []).reduce((total, trade) => total + Number(trade[key] || 0), 0);
        }

        function formatDisplayTime(value) {
            if (!value) {
                return '--';
            }
            const dt = new Date(value);
            if (Number.isNaN(dt.getTime())) {
                return value;
            }
            return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatPnLValue(value) {
            const amount = Number(value || 0);
            return {
                text: `${amount >= 0 ? '+' : ''}${amount.toFixed(2)}`,
                className: amount > 0 ? 'positive' : (amount < 0 ? 'negative' : 'neutral')
            };
        }

        function renderProfitSplitCard(stats) {
            const container = document.getElementById('profitSplitContent');

            container.innerHTML = '';
            if (!stats.length) {

        function computeProfitSplit(trades) {
            const stats = {};
            (trades || []).forEach(trade => {
                if ((trade.status || '').toUpperCase() !== 'CLOSED') {
                    return;
                }
                if (Number(trade.net_return || 0) <= 0) {
                    return;
                }
                const product = (trade.product || 'UNKNOWN').toUpperCase();
                const key = `${trade.app_name || 'UNKNOWN'}||${trade.strategy || 'UNKNOWN'}||${product}`;
                if (!stats[key]) {
                    stats[key] = {
                        app: trade.app_name || 'UNKNOWN',
                        strategy: trade.strategy || 'UNKNOWN',
                        product,
                        buy: 0,
                        sell: 0
                    };
                }
                stats[key][normalizeDirection(trade.direction)] += 1;
            });
            return Object.values(stats).sort((a, b) => (b.buy + b.sell) - (a.buy + a.sell));
        }

        function showFilteredTrades(appName, strategy, direction, status, valueType, product) {
            console.log('showFilteredTrades called with:', { appName, strategy, direction, status, valueType, product });

            // Find the specific subset of trades
            let filteredTrades = allTrades.filter(trade => {
                const tradeDirection = (trade.direction || 'LONG').toLowerCase().includes('long') ? 'buy' : 'sell';
                const tradeStatus = (trade.status || 'OPEN').toLowerCase();
                const tradeProduct = (trade.product || 'UNKNOWN').toUpperCase();

                return trade.app_name === appName &&
                    trade.strategy === strategy &&
                    tradeDirection === direction &&
                    tradeStatus === status.toLowerCase() &&
                    (!product || tradeProduct === product.toUpperCase());
            });

            const directionLabel = direction.toUpperCase();
            const valueLabel = valueType === 'net' ? 'Net P&L' : 'Alt Net';

            const titleHTML = `
                ${appName} (${product || 'All Products'}) - {${strategy}}<br>
                <span style="font-size: 0.8em; color: #a0a0a0;">
                    ${directionLabel} ${status} Trades - ${valueLabel}
                </span>
            `;

            renderTradesToModal(filteredTrades, titleHTML, `${appName}_${strategy}_${directionLabel}_${status}_${valueType}`, valueType);
        }

        function showGlobalFilteredTrades(status, liveOnly) {
            console.log('showGlobalFilteredTrades called with:', { status, liveOnly });

            let filteredTrades = allTrades.filter(trade => {
                const tradeStatus = (trade.status || 'OPEN').toUpperCase();
                // If filtering by specific status, match it. If 'ALL', match everything.
                const isMatchStatus = status === 'ALL' || tradeStatus === status.toUpperCase();

                // Live check: is_live_trade OR order_sent flags
                const isLive = trade.is_live_trade === true || trade.is_live_trade === 'true' ||
                    trade.order_sent_net === true || trade.order_sent_alt === true;

                if (liveOnly) {
                    return isLive && isMatchStatus;
                }
                return isMatchStatus;
            });

            const titleHTML = `
                ${liveOnly ? 'LIVE ' : ''}${status === 'ALL' ? 'All' : status} Trades<br>
                <span style="font-size: 0.8em; color: #a0a0a0;">
                    Showing ${liveOnly ? 'live ' : ''}trades
                </span>
            `;

            renderTradesToModal(filteredTrades, titleHTML, `global_${status}_${liveOnly ? 'live' : 'all'}`, 'net');

        function syntaxHighlightJSON(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, undefined, 4);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }
