        function initializeTimePlayback(trades) {
            if (trades.length === 0) {
                document.getElementById('timePlaybackContainer').style.display = 'none';
                return;
            }

            // Store unfiltered trades
            unfilteredTrades = [...trades];

            // Find min and max entry times
            const times = trades.map(t => new Date(t.entry_time).getTime()).filter(t => !isNaN(t));

            if (times.length === 0) {
                document.getElementById('timePlaybackContainer').style.display = 'none';
                return;
            }

            minTime = Math.min(...times);
            maxTime = Math.max(...times);
            currentFilterTime = maxTime; // Start at end

            // Setup slider
            const slider = document.getElementById('timeSlider');
            slider.min = minTime;
            slider.max = maxTime;
            slider.value = maxTime;

            // Update time displays
            document.getElementById('startTime').textContent = formatTime(new Date(minTime));
            document.getElementById('endTime').textContent = formatTime(new Date(maxTime));
            document.getElementById('timeDisplay').textContent = formatTime(new Date(maxTime));

            // Show playback container
            document.getElementById('timePlaybackContainer').style.display = 'block';

            // Add slider listener
            slider.oninput = function () {
                currentFilterTime = parseInt(this.value);
                document.getElementById('timeDisplay').textContent = formatTime(new Date(currentFilterTime));
                applyTimeFilter();
            };

            console.log('Time playback initialized:', {
                minTime: new Date(minTime),
                maxTime: new Date(maxTime),
                tradeCount: trades.length
            });
        }

        function applyTimeFilter() {
            if (!currentFilterTime) return;

            // Filter trades by entry time
            const filteredByTime = unfilteredTrades.filter(trade => {
                const entryTime = new Date(trade.entry_time).getTime();
                return entryTime <= currentFilterTime;
            });

            console.log(`Showing ${filteredByTime.length} trades up to ${new Date(currentFilterTime)}`);

            // Update display with timestamp
            allTrades = filteredByTime;
            renderSummary(filteredByTime);
            renderStats(filteredByTime);
            renderAdvancedInsights(filteredByTime, virtualTrades);
        }

        function togglePlayback() {
            const btn = document.getElementById('playPauseBtn');

            if (playbackInterval) {
                // Pause
                clearTimeout(playbackInterval);
                playbackInterval = null;
                btn.textContent = '▶️ Play';
                btn.classList.remove('active');
            } else {
                // Play
                if (currentFilterTime >= maxTime) {
                    currentFilterTime = minTime;
                }

                btn.textContent = '⏸️ Pause';
                btn.classList.add('active');

                const stepSize = (maxTime - minTime) / 100; // 100 steps
                const interval = 100 / playbackSpeed; // milliseconds

                const playbackLoop = () => {
                    currentFilterTime += stepSize * playbackSpeed;

                    if (currentFilterTime >= maxTime) {
                        currentFilterTime = maxTime;
                        clearTimeout(playbackInterval);
                        playbackInterval = null;
                        btn.textContent = '▶️ Play';
                        btn.classList.remove('active');
                        return;
                    }

                    document.getElementById('timeSlider').value = currentFilterTime;
                    document.getElementById('timeDisplay').textContent = formatTime(new Date(currentFilterTime));
                    applyTimeFilter();

                    playbackInterval = setTimeout(playbackLoop, interval);
                };

                playbackInterval = setTimeout(playbackLoop, interval);
            }
        }

        function resetPlayback() {
            if (playbackInterval) {
                clearTimeout(playbackInterval);
                playbackInterval = null;
                document.getElementById('playPauseBtn').textContent = '▶️ Play';

            }

            currentFilterTime = minTime;

            document.getElementById('timeDisplay').textContent = formatTime(new Date(minTime));

        }

        function increaseSpeed() {
            const speeds = [0.1, 0.25, 0.5, 1, 2, 5, 10, 20];
            const currentIndex = speeds.indexOf(playbackSpeed);
            if (currentIndex < speeds.length - 1) {
                playbackSpeed = speeds[currentIndex + 1];
                document.getElementById('speedDisplay').textContent = playbackSpeed + 'x';
            }
        }

        function decreaseSpeed() {
            const speeds = [0.1, 0.25, 0.5, 1, 2, 5, 10, 20];
            const currentIndex = speeds.indexOf(playbackSpeed);
            if (currentIndex > 0) {
                playbackSpeed = speeds[currentIndex - 1];
                document.getElementById('speedDisplay').textContent = playbackSpeed + 'x';
            }
        }

                    <textarea id="productTypeMapEditor" spellcheck="false" readonly>${JSON.stringify(cfg.product_type_by_product || {}, null, 4)}</textarea>
                </div>
                <div class="config-section" style="grid-column: 1 / -1;">
                    <h3>📏 Min Value By Product Type (JSON)</h3>
                    <textarea id="minValueByTypeEditor" spellcheck="false">${JSON.stringify(cfg.min_value_by_product_type || {}, null, 4)}</textarea>
                </div>
                <div class="config-section" style="grid-column: 1 / -1;">
                    <h3>📐 Min Move By Product (JSON)</h3>
                    <textarea id="minMoveByProductEditor" spellcheck="false">${JSON.stringify(cfg.min_move_by_product || {}, null, 4)}</textarea>
                </div>
                <div class="config-section" style="grid-column: 1 / -1;">
                    <h3>📏 Min Value By Product (JSON)</h3>
                    <textarea id="minValueByProductEditor" spellcheck="false">${JSON.stringify(cfg.min_value_by_product || {}, null, 4)}</textarea>
                </div>
                <div class="config-section" style="grid-column: 1 / -1;">       
                    <h3>🛡️ Mini Symbol Map (JSON)</h3>
                    <textarea id="miniSymbolMapEditor" spellcheck="false">${JSON.stringify((cfg.trade_mini_config && cfg.trade_mini_config.symbol_map) || {}, null, 4)}</textarea>
                </div>
                <div class="config-section" style="grid-column: 1 / -1;">       
                    <h3>🔗 API Endpoints (JSON)</h3>
                    <textarea id="endpointsEditor" spellcheck="false">${JSON.stringify(cfg.endpoints || {}, null, 4)}</textarea>
                </div>            `;

            html += '</div>';
            body.innerHTML = html;
        }

        function getNestedValue(obj, path) {
            return path.split('.').reduce((prev, curr) => prev ? prev[curr] : null, obj);
        }

        function setNestedValue(obj, path, value) {
            const parts = path.split('.');
            let current = obj;
            for (let i = 0; i < parts.length - 1; i++) {
                if (!current[parts[i]]) current[parts[i]] = {};
                current = current[parts[i]];
            }
            current[parts[parts.length - 1]] = value;
        }

        function addCustomConfigValue(key) {
            const safeId = key.replace(/\./g, '_');
            const input = document.getElementById(`add_${safeId}`);
            const val = input.value.trim();
            if (!val) return;

            const grid = document.querySelector(`#multi_${safeId} .options-grid`);
            const exists = Array.from(grid.querySelectorAll('input')).some(i => i.value === val);

            if (!exists) {
                const label = document.createElement('label');
                label.className = 'option-item';
                label.innerHTML = `<input type="checkbox" value="${val}" checked> ${val}`;
                grid.appendChild(label);
            }
            input.value = '';
        }

        function collectProductTypeMapping() {
            const mapping = {};
            document.querySelectorAll('#configFormBody .product-type-map').forEach(el => {
                const product = String(el.getAttribute('data-product') || '').trim().toUpperCase();
                const productType = String(el.value || '').trim();
                if (product && productType) {
                    mapping[product] = productType;
                }
            });
            const preview = document.getElementById('productTypeMapEditor');
            if (preview) {
                preview.value = JSON.stringify(mapping, null, 4);
            }
            return mapping;
        }

        async function saveConfig() {
            const newConfig = { ...currentConfig };

            // Gather standard inputs
            document.querySelectorAll('#configFormBody input[data-key], #configFormBody select[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                let val;
                if (el.type === 'checkbox') val = el.checked;
                else if (el.type === 'number') val = parseFloat(el.value);
                else val = el.value;

                setNestedValue(newConfig, key, val);
            });

            // [V20260101_1632] Confirmation check for mode switching
            const netModeChangedToManual = (currentConfig.net_activation_mode === 'auto' && newConfig.net_activation_mode === 'manual');
            const altModeChangedToManual = (currentConfig.alt_activation_mode === 'auto' && newConfig.alt_activation_mode === 'manual');

            if (netModeChangedToManual || altModeChangedToManual) {
                if (!confirm('⚠️ Switching to MANUAL mode will automatically DEACTIVATE all system-managed (automated) strategies. Do you want to continue?')) {
                    return;
                }
            } else {
                if (!confirm('Are you sure you want to save these changes to config.json?')) return;
            }

            // Gather multi-selects
            ['automated_trade_sources', 'trade_products', 'trade_mini_config.enabled_products', 'product_types', 'window_size', 'tp_pips', 'sl_pips'].forEach(key => {
                const safeId = key.replace(/\./g, '_');
                const checked = Array.from(document.querySelectorAll(`#multi_${safeId} input:checked`))
                    .map(i => {
                        const v = i.value;
                        if (key === 'automated_trade_sources') return String(v);
                        if (key === 'trade_products' || key === 'trade_mini_config.enabled_products') return String(v).trim().toUpperCase();
                        if (key === 'product_types') return String(v).trim().toLowerCase();
                        return isNaN(v) ? v : parseFloat(v);
                    });
                setNestedValue(newConfig, key, checked);
            });
            if (Array.isArray(newConfig.automated_trade_sources) && newConfig.automated_trade_sources.length > 0) {
                newConfig.automated_trade_source = newConfig.automated_trade_sources[0];
            }

            newConfig.product_type_by_product = collectProductTypeMapping();

            try {
                newConfig.min_value_by_product_type = JSON.parse(document.getElementById('minValueByTypeEditor').value);
            } catch (e) {
                alert('Invalid Min Value By Product Type JSON!');
                return;
            }

            try {
                newConfig.min_move_by_product = JSON.parse(document.getElementById('minMoveByProductEditor').value);
            } catch (e) {
                alert('Invalid Min Move By Product JSON!');
                return;
            }

            try {
                newConfig.min_value_by_product = JSON.parse(document.getElementById('minValueByProductEditor').value);
            } catch (e) {
                alert('Invalid Min Value By Product JSON!');
                return;
            }

            try {
                newConfig.trade_mini_config = newConfig.trade_mini_config || {};
                newConfig.trade_mini_config.symbol_map = JSON.parse(document.getElementById('miniSymbolMapEditor').value);
            } catch (e) {
                alert('Invalid Mini Symbol Map JSON!');
                return;
            }

            try {
                newConfig.endpoints = JSON.parse(document.getElementById('endpointsEditor').value);
            } catch (e) {
                alert('Invalid Endpoints JSON!');
                return;
            }

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newConfig)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Configuration saved successfully!');
                    closeConfigModal();
                    loadConfig(); // Refresh local state
                } else {
                    alert('❌ Error saving config: ' + data.message);
                }
            } catch (error) {
                alert('❌ Error saving config: ' + error);
            }
        }

        function closeConfigModal() {
            document.getElementById('configModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.addEventListener('click', function (event) {
            const modal = document.getElementById('configModal');
            if (event.target == modal) {
                closeConfigModal();
            }
        });


        // Initial loading [2025-12-30 V20251230_0120]
        window.addEventListener('DOMContentLoaded', async () => {
            // [V20260512_0500] Parallelize config and trades fetch for faster loading
            // Config updates UI but trades uses default dropdown value immediately
            const configPromise = loadConfig();
            const tradesPromise = loadTrades();
            await Promise.all([configPromise, tradesPromise]);
        });
    </script>

    <!-- Configuration Modal [2025-12-19 V20251219_0942] -->
    <!-- Strategy Configuration Modal [2025-12-21] -->
    <div id="configModal" class="modal">
        <div class="modal-content" style="max-width: 1400px;">
            <div class="modal-header">
                <h2>⚙️ Strategy Configuration (config.json)</h2>
                <button class="close-btn" onclick="closeConfigModal()">✕</button>
            </div>
            <div class="modal-body" id="configFormBody">
                <!-- Form generated by JS -->
            </div>
            <div class="modal-footer">
                <button onclick="saveConfig()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">💾
                    Save Config</button>
                <button onclick="closeConfigModal()"
                    style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1);">Cancel</button>
            </div>
        </div>
    </div>
</body>
