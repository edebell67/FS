<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Strategies Live</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1020;color:#e8ecff;margin:0;padding:16px}
    .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
    .card{background:#151c33;border:1px solid #2a355f;border-radius:10px;padding:10px}
    h1{font-size:22px;margin:0 0 8px}
    h2{font-size:16px;margin:14px 0 8px}
    .muted{color:#9fb0e6;font-size:12px}
    ul{padding-left:18px}
  </style>
</head>
<body>
  <h1>Top Strategies Live</h1>
  <div class="muted" id="updated">Loading feed...</div>

  <div class="kpi">
    <div class="card"><b id="kStrategies">0</b><div class="muted">Strategies</div></div>
    <div class="card"><b id="kTrades">0</b><div class="muted">Open Trades</div></div>
    <div class="card"><b id="kSignals">0</b><div class="muted">Signals</div></div>
  </div>

  <h2>Top Strategies</h2>
  <div id="strategies"></div>

  <h2>Open Trades</h2>
  <div id="trades"></div>

  <h2>Next Actions</h2>
  <div id="signals"></div>

<script>
fetch('./miniapp_feed_2026-03-06.json').then(r=>r.json()).then(d=>{
  document.getElementById('updated').textContent = 'Updated: ' + d.meta.generated_at_utc;
  document.getElementById('kStrategies').textContent = d.meta.counts.strategies;
  document.getElementById('kTrades').textContent = d.meta.counts.open_trades;
  document.getElementById('kSignals').textContent = d.meta.counts.signals;

  const s = d.strategies.slice(0,5).map(x=>`<div class='card'>${x.strategy_name} · ${x.pair} · net ${x.net_today}</div>`).join('');
  const t = d.open_trades.slice(0,5).map(x=>`<div class='card'>${x.pair} ${x.side} · entry ${x.entry ?? '-'} · pnl ${x.unrealized_pnl ?? '-'}</div>`).join('');
  const g = d.signals.slice(0,5).map(x=>`<div class='card'>${x.pair} ${x.bias} · ${x.trigger_text}</div>`).join('');
  document.getElementById('strategies').innerHTML = s || '<div class="card">No data</div>';
  document.getElementById('trades').innerHTML = t || '<div class="card">No data</div>';
  document.getElementById('signals').innerHTML = g || '<div class="card">No data</div>';
}).catch(e=>{document.getElementById('updated').textContent='Feed load error: '+e;});
</script>
</body>
</html>
